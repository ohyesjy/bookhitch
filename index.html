<style>
:root {
  --bg:     #E7F9A9;
  --bg2:    #D8F090;
  --accent: #3d0814;
  --accent2:#5A1020;
  --accent3:#8A3040;
  --dim:    #7A9A30;
  --dimmer: #C0E880;
  --font:   'Noto Sans KR', sans-serif;
  --vt:     'Playfair Display', 'Noto Sans KR', serif;
  --mono:   'IBM Plex Mono', monospace;

  /* 하위 호환 */
  --green:  #3d0814;
  --green2: #5A1020;
  --green3: #6A2030;
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; background:#E7F9A9; font-family:var(--font); }
body { display:flex; justify-content:center; }

.phone {
  width:100%; max-width:430px; height:100vh;
  position:relative; overflow:hidden;
  display:flex; flex-direction:column;
  background: var(--bg);
}

/* 노이즈 텍스처 — 종이 느낌 */
.phone::before {
  content:'';
  position:absolute; inset:0; z-index:9999; pointer-events:none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.04) 3px,
    rgba(0,0,0,0.04) 4px
  );
}

.phone::after {
  content: none;
}

.screen {
  display:none; flex-direction:column; flex:1;
  overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding-bottom:72px;
  position:relative; z-index:1;
  background: var(--bg);
  color: var(--accent);
}
.screen.active { display:flex; }

/* ══ HOME ══ */
.home-wrap { display:flex; flex-direction:column; flex:1; padding:0; }

.home-hd {
  padding: 52px 20px 0;
  border-bottom: 1px solid rgba(61,8,20,0.15);
  padding-bottom: 14px;
}
.app-name {
  font-family: var(--vt);
  font-size: 40px;
  color: var(--accent);
  letter-spacing: 4px;
  line-height: 1;
  text-shadow: 0 0 16px rgba(61,8,20,0.2);
}
.app-sub {
  font-size: 10px;
  color: var(--green3);
  letter-spacing: 2px;
  margin-top: 5px;
  text-transform: uppercase;
  display: inline-block;
  animation: float-zero-g 4s ease-in-out infinite;
  transform-origin: center;
}
@keyframes float-zero-g {
  0%   { transform: translateY(0px) rotate(-0.5deg); opacity: 0.7; }
  20%  { transform: translateY(-4px) rotate(0.3deg); opacity: 0.9; }
  45%  { transform: translateY(-7px) rotate(0.8deg); opacity: 1; }
  65%  { transform: translateY(-3px) rotate(-0.4deg); opacity: 0.85; }
  80%  { transform: translateY(-6px) rotate(0.2deg); opacity: 0.95; }
  100% { transform: translateY(0px) rotate(-0.5deg); opacity: 0.7; }
}

.sec {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--green3);
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 20px 20px 10px;
  border-bottom: 1px solid var(--dimmer);
  font-weight: 600;
}

.today-wrap { padding: 0 20px; }
.today-block {
  padding: 18px 16px;
  cursor: pointer;
  border-bottom: 1px solid rgba(61,8,20,0.08);
  transition: background 0.1s;
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 12px;
  margin: 10px 0;
  border: 1px solid rgba(255,255,255,0.8);
  box-shadow: 0 2px 16px rgba(61,8,20,0.06);
}
.today-block:active { background: rgba(255,255,255,0.4); }
.today-pre {
  font-size: 9px; color: var(--green3);
  letter-spacing: 2px; margin-bottom: 6px;
}
.today-pre::before { content: '> '; color: var(--green); }
.today-title {
  font-family: var(--vt);
  font-size: 22px; color: var(--green);
  line-height: 1.2; letter-spacing: 2px;
  text-shadow: 0 0 16px rgba(212,240,96,0.3);
}
.today-book {
  font-size: 9px; color: var(--green3);
  margin-top: 6px; letter-spacing: 1px;
}
.today-arrow {
  font-size: 11px; color: var(--accent);
  margin-top: 8px; letter-spacing: 2px;
  animation: blink 1.2s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.streak-wrap { padding: 0 20px; }
.streak-row {
  display:flex; align-items:center;
  justify-content:space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--dimmer);
}
.streak-num {
  font-family: var(--vt);
  font-size: 42px; color: var(--green);
  line-height: 1;
  text-shadow: 0 0 12px rgba(0,255,65,0.6);
}
.streak-lbl {
  font-size: 9px; color: var(--green3);
  letter-spacing: 2px; text-transform: uppercase; margin-top: 2px;
}
.streak-days { display:flex; gap:4px; }
.s-day {
  width: 28px; height: 28px;
  display:flex; align-items:center; justify-content:center;
  font-size: 9px; letter-spacing: 0.5px;
  color: #8AAA40;
  border: 1px solid #B8DA70;
  font-family: var(--font);
}
.s-day.on {
  color: var(--bg);
  background: var(--accent);
  border-color: var(--accent);
  text-shadow: none;
  box-shadow: 0 0 8px rgba(212,240,96,0.4);
}

.shelf-wrap { padding: 0; }
.shelf-list { padding: 0 20px; }
.shelf-item {
  display: flex; align-items: center; gap: 14px;
  padding: 10px 0;
  border-bottom: 1px solid var(--dimmer);
  cursor: pointer;
  transition: background 0.08s;
  position: relative;
}
.shelf-item:active { background: rgba(61,8,20,0.06); }
.shelf-idx {
  font-size: 10px; color: var(--green3);
  min-width: 24px; letter-spacing: 1px;
}
.shelf-emo { font-size: 18px; min-width: 24px; }
.shelf-info { flex: 1; }
.shelf-ttl {
  font-family: var(--font);
  font-size: 14px; color: var(--green);
  font-weight: 700; line-height: 1.35;
  letter-spacing: -0.01em;
}
.shelf-auth {
  font-family: var(--font);
  font-size: 11px; color: var(--green3);
  margin-top: 3px; font-weight: 400;
}
.shelf-bar {
  width: 36px; height: 2px;
  background: var(--dimmer); flex-shrink: 0;
}
.shelf-bar-fill { height: 100%; background: var(--accent); }
.shelf-status {
  font-size: 8px; color: var(--green3);
  letter-spacing: 1px; min-width: 32px; text-align: right;
}

.shelf-add {
  display: flex; align-items: center; gap: 14px;
  padding: 10px 0; cursor: pointer; opacity: 0.4;
  transition: opacity 0.15s;
}
.shelf-add:active { opacity: 0.7; }
.shelf-add-txt { font-size: 11px; color: var(--green3); letter-spacing: 1px; }

.menu-wrap { padding: 0 20px; }
.menu-item {
  display: flex; align-items: center; gap: 16px;
  padding: 12px 0;
  border-bottom: 1px solid var(--dimmer);
  cursor: pointer;
  transition: background 0.08s;
  background: none; border-left: none; border-right: none; border-top: none;
  width: 100%; text-align: left; font-family: var(--font);
}
.menu-item:active { background: rgba(61,8,20,0.06); }
.menu-item:last-child { border-bottom: none; }
.menu-idx {
  font-size: 11px; color: var(--green3);
  letter-spacing: 1px; min-width: 30px;
}
.menu-idx::before { content: '['; }
.menu-idx::after  { content: ']'; }
.menu-label { font-family: var(--font); font-size: 15px; font-weight: 700; color: var(--green); letter-spacing: 0.02em; }
.menu-sub   { font-family: var(--font); font-size: 11px; color: var(--green3); margin-top: 3px; font-weight: 400; }
.menu-arr   { margin-left: auto; font-size: 11px; color: var(--dim); }

/* ══ READER ══ */
:root {
  --vhs-bg:    #F5F0E4;
  --vhs-bg2:   #EDE8D8;
  --vhs-white: #2A0510;
  --vhs-red:   #C01020;
  --vhs-dim:   #4A2830;
  --vhs-line:  rgba(61,8,20,0.12);
}

#reader {
  background: #F5F0E4;
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 4px,
      rgba(0,0,0,0.02) 4px,
      rgba(0,0,0,0.02) 5px
    );
  display: none;
  flex-direction: column;
  overflow: hidden !important;
}
#reader.active {
  display: flex;
  padding-bottom: 0;
}

.r-hd {
  background: #EDE8D8;
  padding: 48px 14px 0;
  position: relative;
  z-index: 10;
  border-bottom: 1px solid rgba(61,8,20,0.12);
  flex-shrink: 0;
}
.r-nav {
  display:flex; align-items:center;
  justify-content:space-between; margin-bottom: 8px;
}
.back-btn {
  font-family: var(--mono);
  font-size: 13px; font-weight: 600; color: rgba(245,240,232,0.7);
  letter-spacing: 2px; text-transform: uppercase;
  background: none; border: none; cursor: pointer;
  padding: 2px 0; transition: color 0.1s;
  opacity: 0.75;
}
.back-btn::before { content:'◀ '; font-size:14px; }
.back-btn:active {
  background: rgba(212,240,96,0.15);
  color: var(--accent);
  opacity: 1;
}
.r-title {
  font-family: var(--vt);
  font-size: 15px; color: var(--vhs-dim);
  flex: 1; text-align: center; padding: 0 6px;
  letter-spacing: 1.5px; text-transform: uppercase;
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
}

.hl-row {
  display:flex; align-items:center; justify-content:space-between;
  padding: 6px 0 8px;
  border-bottom: 1px solid var(--vhs-line);
}
.hl-lbl {
  font-family: var(--vt);
  font-size: 15px; color: var(--vhs-dim);
  letter-spacing: 2px; text-transform: uppercase;
}
.hl-tools { display:flex; gap:7px; align-items:center; }
.h-dot {
  width: 16px; height: 16px;
  cursor: pointer; border: 1px solid rgba(180,200,255,0.25);
  transition: transform 0.12s, border-color 0.12s;
}
.h-dot.active {
  border-color: var(--vhs-white);
  transform: scale(1.2);
  box-shadow: 0 0 4px rgba(255,255,255,0.4);
}
.h-dot.yellow { background: #887720; }
.h-dot.green  { background: #207040; }
.h-dot.pink   { background: #881030; }
.h-dot.blue   { background: #204878; }

/* ── 챕터 탭 (수정 1: 폰트 겹침 해결) ── */
.ch-tabs {
  display: none;
  flex-direction: column;
  overflow-y: auto; max-height: 110px;
  scrollbar-width: none;
  background: rgba(255,255,255,0.45);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid rgba(61,8,20,0.12);
  flex-shrink: 0;
}
.ch-tabs::-webkit-scrollbar { display: none; }

.ch-tab {
  flex-shrink: 0;
  padding: 6px 12px;
  font-family: var(--vt);
  font-size: 17px;
  color: var(--vhs-white);
  background: transparent;
  border: none;
  cursor: pointer;
  text-align: left;
  letter-spacing: 1px;
  text-transform: uppercase;
  line-height: 1.25;
  user-select: none;
  -webkit-user-select: none;
  opacity: 0.75;
  transition: background 0.06s, color 0.06s, opacity 0.06s;
  width: 100%;
  display: flex;
  align-items: baseline;
  gap: 10px;
  overflow: hidden;
}
.ch-tab:hover {
  opacity: 1;
  background: rgba(255,255,255,0.4);
}
.ch-tab.active {
  background: var(--accent);
  color: #E7F9A9;
  opacity: 1;
  text-shadow: none;
  font-weight: 700;
}
/* ★ FIX 1: 번호 고정너비 span */
.ch-tab-num {
  flex-shrink: 0;
  min-width: 52px;
  color: inherit;
  opacity: 0.5;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.03em;
  font-weight: 600;
}
.ch-tab.active .ch-tab-num { opacity: 0.9; color: var(--green); }
.ch-tab-title {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.01em;
}

/* ── READER BODY ── */
.r-body {
  padding: 24px 20px 32px;
  background: #F5F0E4;
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

.ch-eyebrow {
  font-family: var(--vt);
  font-size: 16px; color: #6A3040;
  letter-spacing: 3px; text-transform: uppercase;
  margin-bottom: 4px;
}
.ch-title {
  font-family: var(--vt);
  font-size: 32px; color: #2A0510;
  line-height: 1.15; margin-bottom: 4px;
  letter-spacing: 2px;
  font-weight: 400;
}
.ch-sub {
  font-family: var(--vt);
  font-size: 14px; color: #6A3040;
  letter-spacing: 1px; margin-bottom: 14px;
  text-transform: uppercase;
  opacity: 0.7;
}

.funny-box {
  text-align: center; margin-bottom: 14px;
  padding: 12px 0;
  border-top: 1px solid var(--vhs-line);
  border-bottom: 1px solid var(--vhs-line);
  background: rgba(0,0,0,0.15);
}
.funny-emo { font-size: 40px; display: block; animation: bob 3s ease-in-out infinite; }
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.funny-cap {
  font-family: var(--vt);
  font-size: 14px; color: var(--vhs-dim); margin-top: 5px;
  letter-spacing: 2px; text-transform: uppercase; opacity: 0.6;
}

.story-text {
  font-family: var(--font);
  font-size: 15px; line-height: 1.85;
  color: #2A0510;
  margin-bottom: 20px; letter-spacing: 0.01em;
  font-weight: 400;
}
.story-text p { margin-bottom: 14px; }
.story-text p:last-child { margin-bottom: 0; }
.story-text p:first-child::first-letter {
  font-family: var(--vt);
  font-size: 2.25em;
  font-weight: 600;
  color: #3d0814;
  float: left;
  line-height: 0.8;
  margin-right: 6px;
  margin-top: 6px;
}

.hl { padding: 0 2px; cursor: pointer; }
.hl.yellow { background: rgba(180,160,0,0.45); }
.hl.green  { background: rgba(0,130,60,0.45); }
.hl.pink   { background: rgba(180,0,50,0.4); }
.hl.blue   { background: rgba(0,60,160,0.5); }

.quote-line {
  border-left: 3px solid var(--accent);
  padding: 14px 16px; margin: 20px 0;
  font-family: var(--font);
  font-size: 14px; color: #3d0814;
  line-height: 1.75; letter-spacing: 0.01em;
  background: rgba(61,8,20,0.05);
  border-radius: 0 8px 8px 0;
  font-weight: 500;
}

.sum-block { margin-bottom: 14px; }
.sum-hd {
  font-family: var(--mono);
  font-size: 10px; color: #8A4050;
  letter-spacing: 3px; text-transform: uppercase;
  margin-bottom: 10px; padding-bottom: 8px;
  border-bottom: 1px solid rgba(61,8,20,0.12);
  font-weight: 600;
}
.sum-item {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 9px 0;
  font-family: var(--font);
  font-size: 14px; color: #2A0510;
  line-height: 1.6; letter-spacing: 0.01em;
  border-bottom: 1px solid rgba(61,8,20,0.1);
  font-weight: 400;
}
.sum-item:last-child { border: none; }
.sum-item::before { content: '—'; color: var(--green); flex-shrink: 0; margin-top: 1px; font-size: 12px; font-weight: 700; }

.words-block { margin-bottom: 16px; }
.words-hd {
  font-size: 9px; color: var(--green3);
  letter-spacing: 3px; text-transform: uppercase;
  margin-bottom: 8px; padding-bottom: 6px;
  border-bottom: 1px solid var(--dimmer);
}
.words-hd::before { content: '## '; color: var(--green); }
.word-row {
  display: flex; align-items: baseline; gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(61,8,20,0.1);
  cursor: pointer; transition: background 0.1s;
}
.word-row:active { background: rgba(61,8,20,0.05); }
.word-row:last-child { border: none; }
.w-term { font-family: var(--font); font-size: 14px; font-weight: 700; color: #3d0814; min-width: 80px; letter-spacing: 0.02em; }
.w-def  { font-family: var(--font); font-size: 13px; color: #6A4048; line-height: 1.55; letter-spacing: 0.01em; }

.q-block { margin-bottom: 16px; }
.q-hd {
  font-family: var(--vt);
  font-size: 18px; color: var(--vhs-white);
  letter-spacing: 3px; text-transform: uppercase;
  margin-bottom: 8px; padding-bottom: 6px;
  border-bottom: 1px solid var(--vhs-line);
  opacity: 0.85;
}
.q-card-inner {
  background: #FFFFFF;
  padding: 20px 18px 16px;
  border-radius: 4px;
  position: relative;
  z-index: 2;
}
.q-text {
  font-family: var(--font);
  font-size: 17px; color: #1C2B6E;
  line-height: 1.65; margin-bottom: 16px;
  font-weight: 700; letter-spacing: -0.01em;
}
.q-inp {
  background: transparent;
  border: none;
  border-bottom: 2px solid rgba(28,43,110,0.3);
  padding: 10px 0;
  color: #1C2B6E;
  font-family: var(--font);
  font-size: 15px;
  width: 100%;
  outline: none;
  resize: none;
  line-height: 1.7;
  display: block;
  -webkit-appearance: none;
  appearance: none;
  caret-color: #FF3B2A;
  font-weight: 500;
}
.q-inp::placeholder { color: rgba(28,43,110,0.35); }
.q-inp:focus { border-bottom-color: #CC2200; background: transparent; }
.q-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
  position: relative;
  z-index: 3;
}
.q-char {
  font-family: var(--vt);
  font-size: 15px; color: rgba(28,43,110,0.55);
}
.q-save {
  background: #1C2B6E;
  border: none;
  font-family: var(--vt);
  font-size: 17px;
  color: #ffffff;
  letter-spacing: 2px;
  cursor: pointer;
  padding: 6px 16px;
  display: inline-block;
  position: relative;
  z-index: 10;
  -webkit-appearance: none;
  appearance: none;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}
.q-save:active { background: #CC2200; }
.q-save:disabled {
  background: rgba(28,43,110,0.2);
  color: rgba(28,43,110,0.4);
  cursor: default;
}
.q-done-box { padding: 10px 0 8px; }
.q-done-lbl {
  font-family: var(--vt);
  font-size: 12px; color: rgba(28,43,110,0.5);
  letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase;
}
.q-done-txt {
  font-family: var(--font);
  font-size: 15px; color: #2A0510; line-height: 1.65;
}
.q-re {
  background: none;
  border: 1px solid rgba(28,43,110,0.3);
  font-family: var(--vt);
  font-size: 14px; color: rgba(28,43,110,0.55);

/* 책 탭 필터 */
.hl-tabs {
  display: flex;
  overflow-x: auto;
  gap: 0;
  padding: 12px 0 0;
  border-bottom: 1px solid rgba(61,8,20,0.15);

.hl-tab {

  font-weight: 500;
  color: #8AAA40;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;

  letter-spacing: 1px;
  transition: color 0.15s, border-color 0.15s;
  white-space: nowrap;
}

  color: #3d0814;

}
.hl-list { padding: 0 20px; }
.hl-item {
  padding: 12px 0;

}
.hl-item::before {
  content: ''; position: absolute;

}

/* ══ ADD BOOK ══ */

  width: 100%; position: sticky; bottom: 0; z-index: 100;
  background: #C8E870;
  border-top: 1px solid rgba(61,8,20,0.15);
  display: flex; flex-shrink: 0;
  justify-content: center;
  gap: 0;
  padding: 8px 0 env(safe-area-inset-bottom, 8px);
}
.n-btn {
  flex: 0 0 auto;
  width: 64px;
  display: flex; flex-direction: column;
  align-items: center; gap: 3px; padding: 8px 4px;
  cursor: pointer; border: none; background: none;

/* ══ TOAST ══ */
.toast {
  position: fixed; bottom: 76px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: #3d0814; color: #E7F9A9;
  padding: 7px 14px; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase;
  opacity: 0; transition: all 0.22s;
  pointer-events: none; z-index: 500;
  white-space: nowrap; font-family: var(--font);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══ WORD POPUP ══ */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:200; opacity:0; pointer-events:none; transition:opacity 0.2s; }
.overlay.show { opacity:1; pointer-events:all; }
.word-pop {
  position: fixed; bottom: 72px; left: 16px; right: 16px;
  max-width: 398px; margin: 0 auto;
  background: #FFFFFF;
  border: 1px solid rgba(212,240,96,0.25);
  border-top: 2px solid var(--accent);
  padding: 18px;
  z-index: 300; transform: translateY(14px);
  opacity: 0; transition: all 0.22s; pointer-events: none;
}
.word-pop.show { transform: translateY(0); opacity: 1; pointer-events: all; }
.pop-term { font-family: var(--vt); font-size: 24px; color: var(--accent); margin-bottom: 6px; text-shadow: 0 0 8px rgba(212,240,96,0.4); }
.pop-def  { font-size: 13px; color: #3d0814; line-height: 1.75; margin-bottom: 8px; }
.pop-ex   { font-size: 12px; color: #6A3040; line-height: 1.6; border-top: 1px solid var(--dimmer); padding-top: 8px; letter-spacing: 0.3px; }
.pop-close {
  position: absolute; top: 14px; right: 14px;
  background: none; border: none; cursor: pointer;
  font-size: 10px; color: #8A3040;
  font-family: var(--font); letter-spacing: 1px;
  text-transform: uppercase; transition: color 0.15s;
}
.pop-close:active { color: var(--green); }

@keyframes fadeUp { from{transform:translateY(12px);opacity:0} to{transform:translateY(0);opacity:1} }
.fu  { animation:fadeUp 0.28s ease forwards; }
.fu2 { animation:fadeUp 0.28s ease 0.04s forwards; opacity:0; }
.fu3 { animation:fadeUp 0.28s ease 0.08s forwards; opacity:0; }
.fu4 { animation:fadeUp 0.28s ease 0.12s forwards; opacity:0; }

  var btn  = document.getElementById(uid + '_btn');
  var body = document.getElementById(uid + '_body');

  var open = body.classList.contains('open');
  if (open) {
    body.classList.remove('open');

    body.classList.add('open');
    btn.classList.add('open');

}

function saveAns(idx) {
  var el = document.getElementById('qi' + idx);
  if (!el) { showToast('ERROR'); return; }
  var v = el.value.trim();
  if (v.length < 1) { showToast('내용을 입력해주세요'); return; }
  answers[getKey(idx)] = v;
  try { _set('bh5_ans', answers); } catch(e) {}
  var area = document.getElementById('qa' + idx);
  if (area) {
    area.innerHTML = '<div class="q-done-box">'
      + '<div class="q-done-lbl">// MY NOTE</div>'
      + '<div class="q-done-txt">' + v + '</div>'
      + '</div>'
      + '<br><button class="q-re" onclick="editAns(' + idx + ')">[ 다시 쓰기 ]</button>';
  }
  showToast('저장됐어요!');
}

function editAns(idx) {
  var area = document.getElementById('qa' + idx);
  if (!area) return;
  var prev = answers[getKey(idx)] || '';
  area.innerHTML = '<textarea class="q-inp" id="qi' + idx + '" rows="4">' + prev + '</textarea>'
    + '<br>'
    + '<button class="q-save" onclick="saveAns(' + idx + ')">[ SAVE ]</button>';
  var inp = document.getElementById('qi' + idx);
  if (inp) inp.focus();
}

function getBookProgress(bookIdx) {
  var book = BOOKS[bookIdx];
  var total = book.chapters.length;
  if (total === 0) return { pct: 0, status: '0%', isDone: false };
  var readSet = _get('bh5_read_b' + bookIdx, []);
  var readCount = readSet.length;
  // 전체 읽었으면 DONE
  if (readCount >= total) return { pct: 100, status: 'DONE', isDone: true };
  // 한 번도 안 읽었으면 초기값 유지
  if (readCount === 0) {
    var initPct = book.progress || 0;
    return { pct: initPct, status: initPct > 0 ? initPct + '%' : 'QUEUE', isDone: false };
  }
  var pct = Math.round((readCount / total) * 100);
  return { pct: pct, status: pct + '%', isDone: false };
}

function renderShelf() {
  var list = document.getElementById('shelfList');
  if (!list) return;
  var staticBooks = [];
  var out = '';
  BOOKS.forEach(function(book, i) {
    var prog = getBookProgress(i);
    var isDone = prog.isDone;
    var statusColor = isDone ? 'var(--green3)' : '';
    var fillOpacity = isDone ? ';opacity:0.35' : '';
    out += '<div class="shelf-item" onclick="selectBook(' + i + ')">'
      + '<span class="shelf-idx">[' + i + ']</span>'
      + '<span class="shelf-emo">' + book.emo + '</span>'
      + '<div class="shelf-info">'
      + '<div class="shelf-ttl">' + book.title + '</div>'
      + '<div class="shelf-auth">' + book.author + '</div>'
      + '</div>'
      + '<div class="shelf-bar"><div class="shelf-bar-fill" style="width:' + prog.pct + '%' + fillOpacity + '"></div></div>'
      + '<div class="shelf-status"' + (statusColor ? ' style="color:' + statusColor + '"' : '') + '>' + prog.status + '</div>'
      + '</div>';
  });

function initQuiz() {
  quizPool = [];
  // 모든 책에서 퀴즈 생성
  BOOKS.forEach(function(book, bi) {
    if (!book.chapters) return;
    book.chapters.forEach(function(ch, ci) {
      // 요약 기반 O/X 퀴즈
      if (ch.sm && ch.sm.length > 0) {
        quizPool.push({
          type: 'ox',
          book: book.title,
          q: '"' + book.title + '" - 다음 내용이 맞을까?',
          statement: ch.sm[0],
          answer: true,
          sketch: ['brain','worm','bulb','bomb','dizzy','cat'][Math.floor(Math.random()*6)]
        });
      }
      // 챕터 제목 맞히기
      if (ch.s && ch.body) {
        var bodySnippet = ch.body.slice(0, 60) + '...';
        quizPool.push({
          type: 'title',
          book: book.title,
          q: '"' + book.title + '" - 이 내용의 챕터 제목은?',
          hint: bodySnippet,
          answer: ch.s,
          sketch: ['brain','bulb','cat','dizzy'][Math.floor(Math.random()*4)]
        });
      }
      // 단어 뜻 맞히기
      if (ch.w && ch.w.length > 0) {
        var word = ch.w[0];
        quizPool.push({
          type: 'word',
          book: book.title,
          q: '"' + word.w + '"의 뜻은?',
          answer: word.d,
          wrong1: '기억이 안 나요...',
          sketch: ['worm','bomb','cat'][Math.floor(Math.random()*3)]
        });
      }
    });
  });
  // 셔플
  for (var i = quizPool.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = quizPool[i]; quizPool[i] = quizPool[j]; quizPool[j] = tmp;
  }
  quizIdx = 0;
  showQuiz();
}

function showQuiz() {
  if (!quizPool.length) {
    var wrap = document.getElementById('quizWrap');
    if (wrap) wrap.innerHTML = '<div style="padding:14px 0; text-align:center; font-family:var(--font); font-size:12px; color:var(--green3);">책을 읽고 퀴즈를 풀어보세요!</div>';
    return;
  }
  var quiz = quizPool[quizIdx % quizPool.length];
  var sketchEl = document.getElementById('quizSketch');
  var qEl = document.getElementById('quizQuestion');
  var optEl = document.getElementById('quizOptions');
  var resEl = document.getElementById('quizResult');
  if (!sketchEl || !qEl) return;

  sketchEl.innerHTML = getQuizSketch(quiz.sketch);
  resEl.style.display = 'none';

  if (quiz.type === 'ox') {
    qEl.innerHTML = quiz.q + '<br><span style="font-weight:normal;font-size:12px;color:#6A3040;">"' + quiz.statement + '"</span>';
    optEl.innerHTML = '<button onclick="event.stopPropagation();answerQuiz(true)" style="padding:6px 16px;margin-right:8px;background:var(--accent);color:#E7F9A9;border:none;border-radius:6px;font-family:var(--mono);font-size:11px;cursor:pointer">⭕ 맞아</button>'
      + '<button onclick="event.stopPropagation();answerQuiz(false)" style="padding:6px 16px;background:#8B3040;color:#FFE0E0;border:none;border-radius:6px;font-family:var(--mono);font-size:11px;cursor:pointer">❌ 아니야</button>';
  } else if (quiz.type === 'word') {
    qEl.innerHTML = quiz.q;
    optEl.innerHTML = '<button onclick="event.stopPropagation();revealAnswer()" style="padding:6px 16px;background:var(--accent);color:#E7F9A9;border:none;border-radius:6px;font-family:var(--mono);font-size:11px;cursor:pointer">🤔 정답 보기</button>';
  } else {
    qEl.innerHTML = quiz.q + '<br><span style="font-weight:normal;font-size:11px;color:#6A3040;">' + quiz.hint + '</span>';
    optEl.innerHTML = '<button onclick="event.stopPropagation();revealAnswer()" style="padding:6px 16px;background:var(--accent);color:#E7F9A9;border:none;border-radius:6px;font-family:var(--mono);font-size:11px;cursor:pointer">💡 정답 확인</button>';
  }
}

function answerQuiz(userAnswer) {
  var quiz = quizPool[quizIdx % quizPool.length];
  var resEl = document.getElementById('quizResult');
  var correct = (userAnswer === quiz.answer);
  resEl.style.display = 'block';
  resEl.innerHTML = correct
    ? '<span style="color:#2A6040">🎉 정답! 기억력 짱!</span>'
    : '<span style="color:#8B3040">😅 아쉽! 다시 읽어볼까?</span>';
}

function revealAnswer() {
  var quiz = quizPool[quizIdx % quizPool.length];
  var resEl = document.getElementById('quizResult');
  resEl.style.display = 'block';
  resEl.innerHTML = '<span style="color:#2A6040">💡 정답: ' + quiz.answer + '</span>';
}

    panel.classList.remove('open');
    toggle.classList.remove('open');

    renderCast();
    panel.classList.add('open');
    toggle.classList.add('open');

}

function loadCh(idx, tabEl) {
  curChIdx = idx;
  CHS = BOOKS[curBookIdx].chapters;
  // 마지막 읽은 책+챕터 저장
  try { _set('bh5_last', {b: curBookIdx, c: idx}); } catch(e) {}
  // 읽은 챕터 기록 (진행도 자동 계산용)
  var readKey = 'bh5_read_b' + curBookIdx;
  var readSet = _get(readKey, []);
  if (readSet.indexOf(idx) === -1) { readSet.push(idx); _set(readKey, readSet); }
  document.querySelectorAll('.ch-tab').forEach(t => t.classList.remove('active'));
  if (tabEl) tabEl.classList.add('active');
  const ch = CHS[idx];
  const body = document.getElementById('rBody');

  const storyHTML = ch.body.split('\n\n').map(p => `<p>${p}</p>`).join('');
  const sumHTML   = ch.sm.map(s => `<div class="sum-item">${s}</div>`).join('');
  const wordsHTML = ch.w.map(w =>
    `<div class="word-row" onclick="showWord('${w.w}','${w.d}','${w.e}')"><span class="w-term">${w.w}</span><span class="w-def">${w.d}</span></div>`
  ).join('');
  const qAreaHTML = buildQArea(idx);

  body.innerHTML =
    `<div class="ch-eyebrow fu">${ch.t}</div>` +
    `<div class="ch-title fu">${ch.s}</div>` +
    `<div class="ch-sub fu2">${BOOKS[curBookIdx].title} · ${BOOKS[curBookIdx].author}</div>` +
    `<div class="funny-box fu2"><span class="funny-emo">${ch.fe}</span><div class="funny-cap">// CHAPTER VISUAL</div></div>` +
    `<div class="story-text fu3">${storyHTML}</div>` +
    `<div class="quote-line fu3">${ch.qt}</div>` +
    getSayuSketch(curBookIdx, idx) +
    `<div class="sum-block fu3"><div class="sum-hd">SUMMARY</div>${sumHTML}</div>` +
    `<div class="words-block fu4"><div class="words-hd">WORDS</div>${wordsHTML}</div>` +
    `<div class="q-block fu4"><div class="q-hd">THINK</div>` +
    `<div class="q-card-inner"><div class="q-text">${ch.q}</div>` +
    `<div id="qa${idx}">${qAreaHTML}</div></div></div>` +
    (ch.sayu ? buildSayuHTML(ch, idx) : '') +
    (ch.isLast ? buildCoreHTML() : '') +
    (ch.isLast ? buildEmotionHTML() : '') +

// 음표 주파수
function n(note) {
  var notes = {
    C2:65.4,D2:73.4,E2:82.4,F2:87.3,G2:98,A2:110,B2:123.5,
    C3:130.8,D3:146.8,E3:164.8,F3:174.6,G3:196,A3:220,B3:246.9,
    C4:261.6,D4:293.7,E4:329.6,F4:349.2,G4:392,A4:440,B4:493.9,
    C5:523.3,D5:587.3,E5:659.3,F5:698.5,G5:784,A5:880,

    Db3:138.6,Eb3:155.6,Gb3:185,Ab3:207.7,Bb3:233.1,
    Db5:554.4,Eb5:622.3,Gb5:740,Ab5:830.6,Bb5:932.3,
    REST:0
  };
  return notes[note] || 0;
}

// 음표 재생 (부드러운 envelope)
function playNote(ctx, mg, freq, startTime, duration, type, vol) {
  if (!freq) return;
  var osc = ctx.createOscillator();
  var g = ctx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  var att = Math.min(0.08, duration * 0.2);
  var rel = Math.min(duration * 0.45, 0.6);
  g.gain.setValueAtTime(0, startTime);
  g.gain.linearRampToValueAtTime(vol || 0.15, startTime + att);
  g.gain.setValueAtTime(vol || 0.15, startTime + duration - rel);
  g.gain.linearRampToValueAtTime(0, startTime + duration);
  osc.connect(g); g.connect(mg);
  osc.start(startTime); osc.stop(startTime + duration + 0.1);
}

// 바이노럴 비트 생성 (헤드폰 권장, 아니어도 저주파 동조 효과)
// 왼쪽 귀: base Hz, 오른쪽 귀: base + beat Hz → 뇌가 차이값을 인식
function createBinaural(ctx, baseFreq, beatFreq, vol) {
  var merger = ctx.createChannelMerger(2);
  var splitter = ctx.createChannelSplitter(2);

  var oscL = ctx.createOscillator();
  var oscR = ctx.createOscillator();
  var gL = ctx.createGain();
  var gR = ctx.createGain();

  oscL.type = 'sine'; oscL.frequency.value = baseFreq;
  oscR.type = 'sine'; oscR.frequency.value = baseFreq + beatFreq;
  gL.gain.value = vol; gR.gain.value = vol;

  oscL.connect(gL); oscR.connect(gR);
  gL.connect(merger, 0, 0);
  gR.connect(merger, 0, 1);
  merger.connect(ctx.destination);

  oscL.start(); oscR.start();
  return [oscL, oscR, gL, gR, merger];
}

// 리버브
function makeReverb(ctx, secs) {
  var conv = ctx.createConvolver();
  var len = ctx.sampleRate * (secs || 2.5);
  var buf = ctx.createBuffer(2, len, ctx.sampleRate);
  for (var c = 0; c < 2; c++) {
    var d = buf.getChannelData(c);
    for (var i = 0; i < len; i++)
      d[i] = (Math.random()*2-1) * Math.pow(1-i/len, 2.2);
  }
  conv.buffer = buf;
  return conv;
}

function startMusicLoop(bookId) {
  if (!audioCtx) return;
  var sound = BOOK_SOUNDS[bookId] || BOOK_SOUNDS[0];
  var beat = 60 / (sound.bpm || 72);

  // 마스터 게인
  var masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.75;

  // 리버브 (홀 느낌)
  var reverb = makeReverb(audioCtx, 3);
  var dryGain = audioCtx.createGain(); dryGain.gain.value = 0.55;
  var wetGain = audioCtx.createGain(); wetGain.gain.value = 0.45;
  masterGain.connect(dryGain); dryGain.connect(audioCtx.destination);
  masterGain.connect(reverb); reverb.connect(wetGain); wetGain.connect(audioCtx.destination);
  musicNodes.push(masterGain, reverb, dryGain, wetGain);

  // 바이노럴 비트 (뇌파 동조)
  if (sound.binaural) {
    var bn = createBinaural(
      audioCtx,
      sound.binaural.base,
      sound.binaural.beat,
      sound.binaural.vol
    );
    musicNodes = musicNodes.concat(bn);
  }

  // 멜로디 루프 스케줄러
  var nextLoopTime = audioCtx.currentTime + 0.15;

  function schedule() {
    if (!musicOn) return;
    if (nextLoopTime < audioCtx.currentTime + 0.4) {
      var t = nextLoopTime;
      var loopDur = 0;

      // 멜로디
      sound.mel.forEach(function(m) {
        playNote(audioCtx, masterGain, n(m[0]), t, m[1]*beat*0.82, sound.melType||'sine', sound.melVol||0.13);
        t += m[1] * beat;
      });
      loopDur = t - nextLoopTime;

      // 베이스
      t = nextLoopTime;
      sound.bass.forEach(function(b) {
        playNote(audioCtx, masterGain, n(b[0]), t, b[1]*beat*0.75, 'sine', sound.bassVol||0.09);
        t += b[1] * beat;
      });

      nextLoopTime += loopDur;
    }
    musicScheduler = setTimeout(schedule, 120);
  }
  schedule();
}

function stopMusic() {
  if (musicScheduler) { clearTimeout(musicScheduler); musicScheduler = null; }
  musicNodes.forEach(function(node) {
    try { if (node.stop) node.stop(); node.disconnect(); } catch(e) {}
  });
  musicNodes = [];
}

function toggleMusic() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (musicOn) {
    stopMusic();
    musicOn = false;
    document.getElementById('music-ico').textContent = '♪';
    document.getElementById('music-lbl').textContent = 'BGM';
    document.getElementById('nav-music').classList.remove('active');
    showToast('음악 꺼짐');
  } else {
    var bookId = typeof curBookIdx !== 'undefined' ? curBookIdx : 0;
    musicOn = true;
    startMusicLoop(bookId);
    document.getElementById('music-ico').textContent = '♫';
    document.getElementById('music-lbl').textContent = 'BGM ON';
    document.getElementById('nav-music').classList.add('active');
    var bv = BOOK_SOUNDS[bookId] ? BOOK_SOUNDS[bookId].binaural : null;
    var hz = bv ? ' · α' + bv.beat + 'Hz' : '';
    showToast('♫ ' + (BOOKS[bookId] ? BOOKS[bookId].title : '') + hz);
  }
}

function switchMusicForBook(bookId) {
  if (!musicOn) return;
  stopMusic();
  startMusicLoop(bookId);
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
async function generateBookWithAI() {
  var title = document.getElementById('aiBookTitle').value.trim();
  var author = document.getElementById('aiBookAuthor').value.trim();
  var status = document.getElementById('aiStatus');
  var genBtn = document.querySelector('[onclick="generateBookWithAI()"]');

  if (!title) { showToast('책 제목을 입력해주세요'); return; }

  if (genBtn) { genBtn.disabled = true; genBtn.style.opacity = '0.5'; }
  status.innerHTML = '<div style="margin-bottom:8px">📚 AI가 분석 중... (15~25초)</div><div style="width:100%;height:6px;background:rgba(61,8,20,0.1);border-radius:3px;overflow:hidden"><div id="aiProg" style="width:5%;height:100%;background:linear-gradient(90deg,#3d0814,#E7F9A9);border-radius:3px;transition:width 0.5s"></div></div>';

  var pTimer = setInterval(function() {
    var bar = document.getElementById('aiProg');
    if (bar) { var w = parseFloat(bar.style.width); if (w < 88) bar.style.width = (w + Math.random()*4) + '%'; }
  }, 1500);

  var prompt = '책 "' + title + '"(' + (author || '미상') + '). JSON만(```없이):\n{"title":"제목","author":"저자","emoji":"이모지","genre":"장르","coreLines":["명문장1","명문장2","명문장3"],"emotions":[{"ch":"CH.1","label":"감정","color":"#색상","h":높이}],"chapters":[{"t":"CH.1","s":"제목","body":"7줄 핵심내용. 이것만 읽어도 한 권을 다 읽은 느낌이 나게. 구체적 장면/인물/대사 포함. 초등고학년 눈높이.","qt":"인용구","sm":["요약1","요약2"],"q":"사유질문","fe":"이모지2개","sk":"키워드","w":[{"w":"어려운단어","d":"뜻풀이","e":"예문"}]}]}\n3챕터만. 마지막 isLast:true+작가의도. w는 초등고학년이 모를 단어 2개씩.\n중요: w의 뜻풀이(d)는 초등3학년도 바로 이해할 수 있는 쉬운 말로. 다른 어려운 단어 절대 쓰지 말고 일상 대화체로 설명. 예시: 복리="돈을 맡기면 그 돈이 점점 더 빠르게 불어나는 것", 불시착="갑자기 땅에 내려앉는 것".\nsk:mountain/tree/river/sea/flower/star/moon/person/heart/tear/eye/hand/book/house/key/clock/mirror/candle/bird/fire/road/bridge/empty/temple. 실제 책 내용만. 모르면 title에 "정보부족".';

  try {
    var res = await fetch('/.netlify/functions/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: prompt })
    });

    var bar = document.getElementById('aiProg');
    if (bar) bar.style.width = '85%';

    if (!res.ok) {
      var errText = ''; try { errText = await res.text(); } catch(e2) {}
      throw new Error('서버 오류: ' + res.status);
    }

    var data = await res.json();
    if (!data.content || !data.content[0]) throw new Error('AI 응답이 비어있어요');

    if (bar) bar.style.width = '92%';

    var text = data.content[0].text;
    var clean = text.replace(/```json|```/g, '').trim();
    var book = JSON.parse(clean);

    var newId = BOOKS.length;
    book.id = newId;
    book.emo = book.emoji || '📚';
    book.coreLines = book.coreLines || [];
    book.emotions = book.emotions || [];
    book.chapters = book.chapters.map(function(ch, i) {
      ch.fe = ch.fe || '📖';
      ch.sm = ch.sm || [];
      ch.w = ch.w || [];
      ch.sk = ch.sk || 'book';
      if (i === book.chapters.length - 1) ch.isLast = true;
      return ch;
    });

    BOOKS.push(book);
    try { _set('bh5_custom_books', BOOKS.slice(11)); } catch(e) {}

    clearInterval(pTimer);
    if (bar) bar.style.width = '100%';
    status.textContent = '✅ "' + book.title + '" 완성! (' + book.chapters.length + '챕터)';
    document.getElementById('aiBookTitle').value = '';
    document.getElementById('aiBookAuthor').value = '';
    showToast('📚 ' + book.title + ' 추가 완료!');
    setTimeout(function() { navTo('home'); renderShelf(); }, 1200);

  } catch(e) {
    console.error(e);
    clearInterval(pTimer);
    status.innerHTML = '❌ ' + e.message + '<br>아래에 직접 붙여넣기 해주세요.';
    document.getElementById('aiJsonInput').style.display = 'block';
    document.getElementById('aiJsonBtn').style.display = 'block';
  } finally {
    if (genBtn) { genBtn.disabled = false; genBtn.style.opacity = '1'; }
  }
}

function _getApiKey() {
  var stored = _get('bh5_apikey', '');
  return stored;
}

function applyBookJSON() {
  var jsonText = document.getElementById('aiJsonInput').value.trim();
  var status = document.getElementById('aiStatus');
  try {
    var clean = jsonText.replace(/```json|```/g, '').trim();
    var book = JSON.parse(clean);
    var newId = BOOKS.length;
    book.id = newId;
    book.chapters = book.chapters.map(function(ch, i) {
      ch.fe = ch.fe || '📖';
      ch.sm = ch.sm || [];
      ch.w = ch.w || [];
      if (i === book.chapters.length - 1) ch.isLast = true;
      return ch;
    });
    BOOKS.push(book);
    try { _set('bh5_custom_books', BOOKS.slice(11)); } catch(e) {}
    status.textContent = '✅ 완성!';
    document.getElementById('aiBookTitle').value = '';
    document.getElementById('aiBookAuthor').value = '';
    document.getElementById('aiJsonInput').value = '';
    document.getElementById('aiJsonInput').style.display = 'none';
    document.getElementById('aiJsonBtn').style.display = 'none';
    showToast('📚 ' + book.title + ' 추가 완료!');
    setTimeout(function() { navTo('home'); renderShelf(); }, 1000);
  } catch(e) {
    status.textContent = '❌ JSON 형식 오류. 다시 시도해주세요.';
  }
}

function renderSrch(q) {
  const f = q ? SRCH.filter(b => b.t.includes(q) || b.a.includes(q)) : SRCH;
  document.getElementById('srchRes').innerHTML = f.map((b, i) =>
    `<div class="res-item"><span class="res-idx">[${i}]</span><div class="res-emo">${b.e}</div><div style="flex:1"><div class="res-ttl">${b.t}</div><div class="res-auth">${b.a}</div><div class="res-genre">${b.g}</div></div><button class="res-add" onclick="showToast('ADDED')">ADD</button></div>`
  ).join('');
}
function filterBooks(v) { renderSrch(v); }

window.addEventListener('load', function() {
  try { renderSrch(''); }    catch(e) { console.warn('renderSrch error', e); }

  try { renderToday(); }     catch(e) { console.warn('renderToday error', e); }

});
