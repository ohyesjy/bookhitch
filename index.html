<script>
// localStorage 안전 래퍼 — 인앱브라우저 차단 대응
var _store = {};
function _get(k, def) { try { var v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch(e) { return def; } }
function _set(k, v)   { try { localStorage.setItem(k, JSON.stringify(v)); _store[k] = v; } catch(e) { _store[k] = v; } }
function _del(k)      { try { localStorage.removeItem(k); } catch(e) {} delete _store[k]; }

let highlights = _get('bh5_hl', []);
let answers    = _get('bh5_ans', {});
let curChIdx   = 0;
</script>

<script>
window.addEventListener('load', function() {
  // 숨긴 빌트인 도서 제외
  try {
    var hidden = _get('bh5_hidden_books', []);
    if (hidden && hidden.length > 0) {
      for (var hi = BOOKS.length - 1; hi >= 0; hi--) {
        var hkey = BOOKS[hi].title + '::' + BOOKS[hi].author;
        if (hidden.indexOf(hkey) !== -1) BOOKS.splice(hi, 1);
      }
      BOOKS.forEach(function(b, i) { b.id = i; });
      console.log('Hidden ' + hidden.length + ' builtin books');
    }
  } catch(e) { console.warn('Hidden books filter error', e); }
  // 커스텀 책 로드 (AI로 추가한 책들)
  try {
    var customBooks = _get('bh5_custom_books', []);
    if (customBooks && customBooks.length > 0) {
      customBooks.forEach(function(book, i) {
        book.id = BOOKS.length;
        book.emo = book.emo || book.emoji || '📚';
        book.chapters = (book.chapters || []).map(function(ch, ci) {
          ch.fe = ch.fe || '📖';
          ch.sm = ch.sm || [];
          ch.w = ch.w || [];
          ch.sk = ch.sk || 'book';
          return ch;
        });
        BOOKS.push(book);
        // 음악도 자동 생성
        if (typeof generateBookMusic === 'function') {
          generateBookMusic(book.id, book.genre || '');
        }
      });
      console.log('Loaded ' + customBooks.length + ' custom books');
    }
  } catch(e) { console.warn('Custom books load error', e); }

  try { renderMyCustomBooks(); } catch(e) { console.warn('renderMyCustomBooks error', e); }
  try { renderBookmarks(); } catch(e) { console.warn('renderBookmarks error', e); }
