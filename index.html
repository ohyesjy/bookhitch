<style>
:root {
  --bg:     #B1EFC1;
  --bg2:    #E8B97A;
  --accent: #1A0D00;
  --accent2:#3D1A00;
  --accent3:#6B3A1F;
  --dim:    #5C3010;
  --dimmer: rgba(0,0,0,0.2);
  --font:   'Noto Sans KR', sans-serif;
  --vt:     'Playfair Display', 'Noto Sans KR', serif;
  --mono:   'IBM Plex Mono', monospace;

  /* 하위 호환 */
  --green:  #1A0D00;
  --green2: #3D1A00;
  --green3: #5C3010;
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; background:#B1EFC1; font-family:var(--font); }
body { display:flex; justify-content:center; }

.phone {
  width:100%; max-width:430px; height:100vh;
  position:relative; overflow:hidden;
  display:flex; flex-direction:column;
  background: var(--bg);
}

/* 텍스처 없음 v1774712730 */
.phone::before {
  content:'';
  position:absolute; inset:0; z-index:9999; pointer-events:none;
  background: none;
}

.phone::after {
  content: none;
}

.screen {
  display:none; flex-direction:column; flex:1;
  overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding-bottom:72px;
  position:relative; z-index:1;
  background: transparent;
  color: var(--accent);
}
.screen.active { display:flex; }

/* ══ HOME ══ */
.home-wrap { display:flex; flex-direction:column; flex:1; padding:0; }

.home-hd {
  padding: 28px 20px 0;
  border-bottom: 0.5px solid rgba(0,0,0,0.2);
  padding-bottom: 10px;
}
.app-name {
  font-family: '돋움', 'Dotum', sans-serif;
  font-size: 37px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: 2px;
  line-height: 1;
  text-shadow: 0 0 16px rgba(61,8,20,0.2);
}
.app-sub {
  font-size: 11.5px;
  color: var(--green3);
  letter-spacing: 2px;
  margin-top: 5px;
  text-transform: uppercase;
  display: inline-block;
  animation: float-zero-g 4s ease-in-out infinite;
  transform-origin: center;
}
@keyframes float-zero-g {
  0%   { transform: translateY(0px) rotate(-0.5deg); opacity: 0.7; }
  20%  { transform: translateY(-4px) rotate(0.3deg); opacity: 0.9; }
  45%  { transform: translateY(-7px) rotate(0.8deg); opacity: 1; }
  65%  { transform: translateY(-3px) rotate(-0.4deg); opacity: 0.85; }
  80%  { transform: translateY(-6px) rotate(0.2deg); opacity: 0.95; }
  100% { transform: translateY(0px) rotate(-0.5deg); opacity: 0.7; }
}

.sec {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--green3);
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 8px 20px 6px;
  border-bottom: 0.5px solid rgba(0,0,0,0.2);
  font-weight: 600;
}

.today-wrap {
  padding: 0;
  margin: 0;
  background: transparent;
  position: relative;
}
.today-block {
  padding: 22px 40px 22px 40px;
  cursor: pointer;
  transition: opacity 0.1s;
  background: transparent !important;
  background-image: none !important;
  border-radius: 0;
  margin: 10px 0;
  border: none;
  box-shadow: none;
  min-height: 180px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.today-block:active { opacity: 0.8; }
.today-pre {
  font-size: 13px; color: #20222B;
  letter-spacing: 2px; margin-bottom: 6px;
  padding-left: 10px; font-weight: 600;
}
.today-pre::before { content: '> '; color: rgba(32,34,43,0.5); }
.today-title {
  font-family: var(--vt);
  font-size: 20px; color: #20222B;
  line-height: 1.2; letter-spacing: 2px;
  text-align: center;
  padding-left: 0;
  -webkit-text-stroke: 0.3px #20222B;
}
.today-book {
  font-size: 9px; color: #20222B;
  margin-top: 4px; letter-spacing: 1px;
  text-shadow: none;
  padding-left: 10px;
}
.today-arrow { color: #20222B !important;
  font-size: 10px; color: #1A1A1A;
  margin-top: 6px; letter-spacing: 2px;
  animation: blink 1.2s step-end infinite;
  padding-left: 10px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.streak-wrap { padding: 0; }
.streak-row {
  display:flex; align-items:center;
  justify-content:space-between;
  padding: 14px 0;
  border-bottom: 0.5px solid rgba(0,0,0,0.2);
}
.streak-num {
  font-family: var(--vt);
  font-size: 42px; color: var(--green);
  line-height: 1;
  text-shadow: 0 0 12px rgba(0,255,65,0.6);
}
.streak-lbl {
  font-size: 9px; color: var(--green3);
  letter-spacing: 2px; text-transform: uppercase; margin-top: 2px;
}
.streak-days { display:flex; gap:4px; }
.s-day {
  width: 28px; height: 28px;
  display:flex; align-items:center; justify-content:center;
  font-size: 9px; letter-spacing: 0.5px;
  color: #8AAA40;
  border: 1px solid #B8DA70;
  font-family: var(--font);
}
.s-day.on {
  color: var(--bg);
  background: var(--accent);
  border-color: var(--accent);
  text-shadow: none;
  box-shadow: 0 0 8px rgba(212,240,96,0.4);
}

.shelf-wrap { padding: 0; }
.shelf-list { padding: 0 20px; }
.shelf-item {
  display: flex; align-items: center; gap: 14px;
  padding: 10px 0;
  border-bottom: 0.5px solid var(--dimmer);
  cursor: pointer;
  transition: background 0.08s;
  position: relative;
}
.shelf-item:active { background: rgba(0,0,0,0.11); }
.shelf-idx {
  font-size: 10px; color: var(--green3);
  min-width: 24px; letter-spacing: 1px;
}
.shelf-emo { font-size: 18px; min-width: 24px; }
.shelf-info { flex: 1; }
.shelf-ttl {
  font-family: var(--font);
  font-size: 14px; color: var(--green);
  font-weight: 700; line-height: 1.35;
  letter-spacing: -0.01em;
}
.shelf-auth {
  font-family: var(--font);
  font-size: 11px; color: var(--green3);
  margin-top: 3px; font-weight: 400;
}
.shelf-bar {
  width: 36px; height: 2px;
  background: var(--dimmer); flex-shrink: 0;
}
.shelf-bar-fill { height: 100%; background: var(--accent); }
.shelf-status {
  font-size: 8px; color: var(--green3);
  letter-spacing: 1px; min-width: 32px; text-align: right;
}

.shelf-add {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 0; cursor: pointer; opacity: 1;
  transition: opacity 0.15s;
}
.shelf-add:active { opacity: 0.6; }
.shelf-add-txt { font-size: 16px; color: var(--accent); letter-spacing: 2px; font-weight: 700; }

.menu-wrap { padding: 0 20px; }
.menu-item {
  display: flex; align-items: center; gap: 16px;
  padding: 12px 0;
  border-bottom: 0.5px solid var(--dimmer);
  cursor: pointer;
  transition: background 0.08s;
  background: none; border-left: none; border-right: none; border-top: none;
  width: 100%; text-align: left; font-family: var(--font);
}
.menu-item:active { background: rgba(0,0,0,0.11); }
.menu-item:last-child { border-bottom: none; }
.menu-idx {
  font-size: 11px; color: var(--green3);
  letter-spacing: 1px; min-width: 30px;
}
.menu-idx::before { content: '['; }
.menu-idx::after  { content: ']'; }
.menu-label { font-family: var(--font); font-size: 15px; font-weight: 700; color: var(--green); letter-spacing: 0.02em; }
.menu-sub   { font-family: var(--font); font-size: 11px; color: var(--green3); margin-top: 3px; font-weight: 400; }
.menu-arr   { margin-left: auto; font-size: 11px; color: var(--dim); }

/* ══ READER ══ */
:root {
  --vhs-bg:    #F5F0E4;
  --vhs-bg2:   #EDE8D8;
  --vhs-white: #2A0510;
  --vhs-red:   #C01020;
  --vhs-dim:   #4A2830;
  --vhs-line:  rgba(0,0,0,0.18);
}

#reader {
  background: #F5F0E4;

  display: none;
  flex-direction: column;
  overflow: hidden !important;
}
#reader.active {
  display: flex;
  padding-bottom: 0;
}

.r-hd {
  background: #EDE8D8;
  padding: 48px 14px 0;
  position: relative;
  z-index: 10;
  border-bottom: 0.5px solid rgba(0,0,0,0.2);
  flex-shrink: 0;
}
.r-nav {
  display:flex; align-items:center;
  justify-content:space-between; margin-bottom: 8px;
}
.back-btn {
  font-family: var(--mono);
  font-size: 13px; font-weight: 600; color: rgba(245,240,232,0.7);
  letter-spacing: 2px; text-transform: uppercase;
  background: none; border: none; cursor: pointer;
  padding: 2px 0; transition: color 0.1s;
  opacity: 0.75;
}
.back-btn::before { content:'◀ '; font-size:14px; }
.back-btn:active {
  background: rgba(212,240,96,0.15);
  color: var(--accent);
  opacity: 1;
}
.r-title {
  font-family: var(--vt);
  font-size: 15px; color: var(--vhs-dim);
  flex: 1; text-align: center; padding: 0 6px;
  letter-spacing: 1.5px; text-transform: uppercase;
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
}

.hl-row {
  display:flex; align-items:center; justify-content:space-between;
  padding: 6px 0 8px;
  border-bottom: 1px solid var(--vhs-line);
}
.hl-lbl {
  font-family: var(--vt);
  font-size: 15px; color: var(--vhs-dim);
  letter-spacing: 2px; text-transform: uppercase;
}
.hl-tools { display:flex; gap:7px; align-items:center; }
.h-dot {
  width: 16px; height: 16px;
  cursor: pointer; border: 1px solid rgba(180,200,255,0.25);
  transition: transform 0.12s, border-color 0.12s;
}
.h-dot.active {
  border-color: var(--vhs-white);
  transform: scale(1.2);
  box-shadow: 0 0 4px rgba(255,255,255,0.4);
}
.h-dot.yellow { background: #887720; }
.h-dot.green  { background: #207040; }
.h-dot.pink   { background: #881030; }
.h-dot.blue   { background: #204878; }

/* ── 챕터 탭 (수정 1: 폰트 겹침 해결) ── */
.ch-tabs {
  display: none;
  flex-direction: column;
  overflow-y: auto; max-height: 110px;
  scrollbar-width: none;
  background: rgba(255,255,255,0.45);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 0.5px solid rgba(0,0,0,0.18);
  flex-shrink: 0;
}
.ch-tabs::-webkit-scrollbar { display: none; }

.ch-tab {
  flex-shrink: 0;
  padding: 6px 12px;
  font-family: var(--vt);
  font-size: 17px;
  color: var(--vhs-white);
  background: transparent;
  border: none;
  cursor: pointer;
  text-align: left;
  letter-spacing: 1px;
  text-transform: uppercase;
  line-height: 1.25;
  user-select: none;
  -webkit-user-select: none;
  opacity: 0.75;
  transition: background 0.06s, color 0.06s, opacity 0.06s;
  width: 100%;
  display: flex;
  align-items: baseline;
  gap: 10px;
  overflow: hidden;
}
.ch-tab:hover {
  opacity: 1;
  background: rgba(255,255,255,0.4);
}
.ch-tab.active {
  background: var(--accent);
  color: #E7F9A9;
  opacity: 1;
  text-shadow: none;
  font-weight: 700;
}
/* ★ FIX 1: 번호 고정너비 span */
.ch-tab-num {
  flex-shrink: 0;
  min-width: 52px;
  color: inherit;
  opacity: 0.5;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.03em;
  font-weight: 600;
}
.ch-tab.active .ch-tab-num { opacity: 0.9; color: var(--green); }
.ch-tab-title {
  flex: 1;
  min-width: 0;
  overflow: visible;
  white-space: normal;
  word-break: keep-all;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.01em;
}

/* ── READER BODY ── */
.r-body {
  padding: 24px 20px 32px;
  background: #F5F0E4;
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

.ch-eyebrow {
  font-family: var(--vt);
  font-size: 16px; color: #6A3040;
  letter-spacing: 3px; text-transform: uppercase;
  margin-bottom: 4px;
}
.ch-title {
  font-family: var(--vt);
  font-size: 32px; color: #2A0510;
  line-height: 1.15; margin-bottom: 4px;
  letter-spacing: 2px;
  font-weight: 400;
}
.ch-sub {
  font-family: var(--vt);
  font-size: 14px; color: #6A3040;
  letter-spacing: 1px; margin-bottom: 14px;
  text-transform: uppercase;
  opacity: 0.7;
}

.funny-box {
  text-align: center; margin-bottom: 14px;
  padding: 12px 0;
  border-top: 1px solid var(--vhs-line);
  border-bottom: 1px solid var(--vhs-line);
  background: rgba(0,0,0,0.15);
}
.funny-emo { font-size: 40px; display: block; animation: bob 3s ease-in-out infinite; }
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.funny-cap {
  font-family: var(--vt);
  font-size: 14px; color: var(--vhs-dim); margin-top: 5px;
  letter-spacing: 2px; text-transform: uppercase; opacity: 0.6;
}

.story-text {
  font-family: var(--font);
  font-size: 15px; line-height: 1.85;
  color: #2A0510;
  margin-bottom: 20px; letter-spacing: 0.01em;
  font-weight: 400;
}
.story-text p { margin-bottom: 14px; }
.story-text p:last-child { margin-bottom: 0; }
.story-text p:first-child::first-letter {
  font-family: var(--vt);
  font-size: 2.25em;
  font-weight: 600;
  color: #3d0814;
  float: left;
  line-height: 0.8;
  margin-right: 6px;
  margin-top: 6px;
}

.hl { padding: 0 2px; cursor: pointer; }
.hl.yellow { background: rgba(180,160,0,0.45); }
.hl.green  { background: rgba(0,130,60,0.45); }
.hl.pink   { background: rgba(180,0,50,0.4); }
.hl.blue   { background: rgba(0,60,160,0.5); }

.quote-line {
  border-left: 3px solid var(--accent);
  padding: 14px 16px; margin: 20px 0;
  font-family: var(--font);
  font-size: 14px; color: #3d0814;
  line-height: 1.75; letter-spacing: 0.01em;
  background: rgba(61,8,20,0.05);
  border-radius: 0 8px 8px 0;
  font-weight: 500;
}

.sum-block { margin-bottom: 14px; }
.sum-hd {
  font-family: var(--mono);
  font-size: 10px; color: #8A4050;
  letter-spacing: 3px; text-transform: uppercase;
  margin-bottom: 10px; padding-bottom: 8px;
  border-bottom: 0.5px solid rgba(0,0,0,0.2);
  font-weight: 600;
}
.sum-item {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 9px 0;
  font-family: var(--font);
  font-size: 14px; color: #2A0510;
  line-height: 1.6; letter-spacing: 0.01em;
  border-bottom: 0.5px solid rgba(0,0,0,0.16);
  font-weight: 400;
}
.sum-item:last-child { border: none; }
.sum-item::before { content: '—'; color: var(--green); flex-shrink: 0; margin-top: 1px; font-size: 12px; font-weight: 700; }

.words-block { margin-bottom: 16px; }
.words-hd {
  font-size: 9px; color: var(--green3);
  letter-spacing: 3px; text-transform: uppercase;
  margin-bottom: 8px; padding-bottom: 6px;
  border-bottom: 0.5px solid var(--dimmer);
}
.words-hd::before { content: '## '; color: var(--green); }
.word-row {
  display: flex; align-items: baseline; gap: 10px;
  padding: 8px 0;
  border-bottom: 0.5px solid rgba(0,0,0,0.16);
  cursor: pointer; transition: background 0.1s;
}
.word-row:active { background: rgba(61,8,20,0.05); }
.word-row:last-child { border: none; }
.w-term { font-family: var(--font); font-size: 14px; font-weight: 700; color: #3d0814; min-width: 80px; letter-spacing: 0.02em; }
.w-def  { font-family: var(--font); font-size: 13px; color: #6A4048; line-height: 1.55; letter-spacing: 0.01em; }

.q-block { margin-bottom: 16px; }
.q-hd {
  font-family: var(--vt);
  font-size: 18px; color: var(--vhs-white);
  letter-spacing: 3px; text-transform: uppercase;
  margin-bottom: 8px; padding-bottom: 6px;
  border-bottom: 1px solid var(--vhs-line);
  opacity: 0.85;
}
.q-card-inner {
  background: #FFFFFF;
  padding: 20px 18px 16px;
  border-radius: 4px;
  position: relative;
  z-index: 2;
}
.q-text {
  font-family: var(--font);
  font-size: 17px; color: #1C2B6E;
  line-height: 1.65; margin-bottom: 16px;
  font-weight: 700; letter-spacing: -0.01em;
}
.q-inp {
  background: transparent;
  border: none;
  border-bottom: 2px solid rgba(28,43,110,0.3);
  padding: 10px 0;
  color: #1C2B6E;
  font-family: var(--font);
  font-size: 15px;
  width: 100%;
  outline: none;
  resize: none;
  line-height: 1.7;
  display: block;
  -webkit-appearance: none;
  appearance: none;
  caret-color: #FF3B2A;
  font-weight: 500;
}
.q-inp::placeholder { color: rgba(28,43,110,0.35); }
.q-inp:focus { border-bottom-color: #CC2200; background: transparent; }
.q-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
  position: relative;
  z-index: 3;
}
.q-char {
  font-family: var(--vt);
  font-size: 15px; color: rgba(28,43,110,0.55);
}
.q-save {
  background: #1C2B6E;
  border: none;
  font-family: var(--vt);
  font-size: 17px;
  color: #ffffff;
  letter-spacing: 2px;
  cursor: pointer;
  padding: 6px 16px;
  display: inline-block;
  position: relative;
  z-index: 10;
  -webkit-appearance: none;
  appearance: none;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}
.q-save:active { background: #CC2200; }
.q-save:disabled {
  background: rgba(28,43,110,0.2);
  color: rgba(28,43,110,0.4);
  cursor: default;
}
.q-done-box { padding: 10px 0 8px; }
.q-done-lbl {
  font-family: var(--vt);
  font-size: 12px; color: rgba(28,43,110,0.5);
  letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase;
}
.q-done-txt {
  font-family: var(--font);
  font-size: 15px; color: #2A0510; line-height: 1.65;
}
.q-re {
  background: none;
  border: 1px solid rgba(28,43,110,0.3);

/* 책 탭 필터 */
.hl-tabs {
  display: flex;
  overflow-x: auto;
  gap: 0;
  padding: 12px 0 0;
  border-bottom: 0.5px solid rgba(0,0,0,0.2);

}
.hl-tabs::-webkit-scrollbar { display: none; }
.hl-tab {
  flex-shrink: 0;
  padding: 7px 14px 9px;
  font-family: var(--font);

  font-weight: 500;
  color: #8AAA40;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  letter-spacing: 1px;
  transition: color 0.15s, border-color 0.15s;
  white-space: nowrap;
}

  color: #3d0814;

}
.hl-list { padding: 0 20px; }
.hl-item {
  padding: 12px 0;
  border-bottom: 0.5px solid var(--dimmer);
  position: relative;
}
.hl-item::before {
  content: ''; position: absolute;
  left: 0; top: 12px; bottom: 12px; width: 2px;
}
.hl-item.yellow::before { background: #887700; }
.hl-item.green::before  { background: var(--green3); }
.hl-item.pink::before   { background: #770030; }

/* ══ ADD BOOK ══ */

/* ══ NAV ══ */

  width: 100%; position: sticky; bottom: 0; z-index: 100;
  background: var(--bg);
  border-top: 1.5px solid #1A1A1A;
  display: flex; flex-shrink: 0;
  justify-content: center;
  gap: 0;
  padding: 8px 0 env(safe-area-inset-bottom, 8px);
}
.n-btn {
  flex: 0 0 auto;
  width: 64px;
  display: flex; flex-direction: column;
  align-items: center; gap: 3px; padding: 8px 4px;
  cursor: pointer; border: none; background: none;

/* ══ TOAST ══ */
.toast {
  position: fixed; bottom: 76px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: #3d0814; color: #E7F9A9;
  padding: 7px 14px; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase;
  opacity: 0; transition: all 0.22s;
  pointer-events: none; z-index: 500;
  white-space: nowrap; font-family: var(--font);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══ WORD POPUP ══ */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:200; opacity:0; pointer-events:none; transition:opacity 0.2s; }
.overlay.show { opacity:1; pointer-events:all; }
.word-pop {
  position: fixed; bottom: 72px; left: 16px; right: 16px;
  max-width: 398px; margin: 0 auto;
  background: #FFFFFF;
  border: 1px solid rgba(212,240,96,0.25);
  border-top: 2px solid var(--accent);
  padding: 18px;
  z-index: 300; transform: translateY(14px);
  opacity: 0; transition: all 0.22s; pointer-events: none;
}
.word-pop.show { transform: translateY(0); opacity: 1; pointer-events: all; }
.pop-term { font-family: var(--vt); font-size: 24px; color: var(--accent); margin-bottom: 6px; text-shadow: 0 0 8px rgba(212,240,96,0.4); }
.pop-def  { font-size: 13px; color: #3d0814; line-height: 1.75; margin-bottom: 8px; }
.pop-ex   { font-size: 12px; color: #6A3040; line-height: 1.6; border-top: 0.5px solid var(--dimmer); padding-top: 8px; letter-spacing: 0.3px; }
.pop-close {
  position: absolute; top: 14px; right: 14px;
  background: none; border: none; cursor: pointer;
  font-size: 10px; color: #8A3040;
  font-family: var(--font); letter-spacing: 1px;
  text-transform: uppercase; transition: color 0.15s;
}
.pop-close:active { color: var(--green); }

@keyframes fadeUp { from{transform:translateY(12px);opacity:0} to{transform:translateY(0);opacity:1} }
.fu  { animation:fadeUp 0.28s ease forwards; }
.fu2 { animation:fadeUp 0.28s ease 0.04s forwards; opacity:0; }
.fu3 { animation:fadeUp 0.28s ease 0.08s forwards; opacity:0; }
.fu4 { animation:fadeUp 0.28s ease 0.12s forwards; opacity:0; }

function buildCoreHTML() {
  var book = BOOKS[curBookIdx];
  var lines = book.coreLines || [];
  if (!lines.length) return '';
  var rows = lines.map(function(l) {
    return '<div class="core-line">' + l + '</div>';
  }).join('');
  return '<div class="core-card fu4">'
    + '<div class="core-label">★ 이 책의 핵심 문장</div>'
    + rows
    + '</div>';
}

function buildEmotionHTML() {
  var book = BOOKS[curBookIdx];
  var emos = book.emotions || [];
  if (!emos.length) return '';
  var bars = emos.map(function(e) {
    var h = e.h || 40;
    var chLabel = e.ch.replace('CH.','').replace('PART.','P');
    return '<div class="emotion-bar-wrap">'
      + '<div class="emotion-bar" style="height:' + h + 'px;background:' + e.color + ';opacity:0.85"></div>'
      + '<div class="emotion-lbl">' + e.label + '</div>'
      + '<div class="emotion-ch">' + chLabel + '</div>'
      + '</div>';
  }).join('');
  return '<div class="emotion-card fu4">'
    + '<div class="emotion-label">// 챕터별 감정 흐름</div>'
    + '<div class="emotion-flow" style="align-items:flex-end">' + bars + '</div>'
    + '</div>';
}

function editBA(key, inpId) {
  var prev = answers[key] || '';
  var els = document.querySelectorAll('.ba-re');
  var wrap = null;
  for (var i = 0; i < els.length; i++) {
    var oc = els[i].getAttribute('onclick') || '';
    if (oc.indexOf(key) !== -1) { wrap = els[i].parentElement; break; }
  }
  if (!wrap) return;
  var tag = wrap.querySelector('.ba-tag');
  var tagText = tag ? tag.innerHTML : '';
  wrap.innerHTML = '<div class="ba-tag">' + tagText + '</div>'
    + '<textarea class="ba-inp" id="' + inpId + '" rows="2">' + prev + '</textarea>'
    + '<button class="ba-save" onclick="saveBA(\'' + key + '\',\'' + inpId + '\')">[ SAVE ]</button>';
  var inp = document.getElementById(inpId);
  if (inp) inp.focus();
}

function saveEndingAns(key, uid) {
  var el = document.getElementById(uid);
  if (!el) return;
  var v = el.value.trim();
  if (!v) { showToast('내용을 입력해주세요'); return; }
  answers[key] = v;
  try { _set('bh5_ans', answers); } catch(e) {}
  var wrap = el.closest('.ending-qa-wrap') || el.parentElement;
  if (wrap) {
    wrap.innerHTML = '<div class="ending-done-lbl">// MY NOTE</div>'
      + '<div class="ending-done">' + v + '</div>'
      + '<button class="ending-re" onclick="editEndingAns(\'' + key + '\',\'' + uid + '\')">[다시 쓰기]</button>';
  }
  showToast('저장됐어요!');
}

function editEndingAns(key, uid) {
  var prev = answers[key] || '';
  var btns = document.querySelectorAll('.ending-re');
  var wrap = null;
  for (var i = 0; i < btns.length; i++) {
    if (btns[i].getAttribute('onclick') && btns[i].getAttribute('onclick').includes(key)) {
      wrap = btns[i].parentElement; break;
    }
  }
  if (!wrap) return;
  wrap.innerHTML = '<textarea class="ending-inp" id="' + uid + '" rows="3">' + prev + '</textarea>'
    + '<button class="ending-save" onclick="saveEndingAns(\'' + key + '\',\'' + uid + '\')">[ SAVE ]</button>';
  var inp = document.getElementById(uid);
  if (inp) inp.focus();
}

function buildCastHTML() {
  var book = BOOKS[curBookIdx];
  var cast = book.cast || [];
  if (!cast.length) return '';
  var rows = cast.map(function(c) {
    return '<div class="cast-row">'
      + '<div class="cast-row-emo">' + c.emo + '</div>'
      + '<div>'
      + '<div class="cast-row-name">' + c.name + '</div>'
      + '<div class="cast-row-role">' + c.role + '</div>'
      + '<div class="cast-row-desc">' + c.desc + '</div>'
      + '</div></div>';
  }).join('');
  var uid = 'cast_' + curBookIdx;
  return '<div class="cast-inline fu2">'
    + '<button class="cast-inline-toggle" id="' + uid + '_btn" onclick="toggleCastInline(\'' + uid + '\')">'
    + 'CAST   <span style="font-size:12px">▼</span>'
    + '</button>'
    + '<div class="cast-inline-body" id="' + uid + '_body">' + rows + '</div>'
    + '</div>';
}

function toggleCastInline(uid) {
  var btn  = document.getElementById(uid + '_btn');
  var body = document.getElementById(uid + '_body');
  if (!btn || !body) return;
  var open = body.classList.contains('open');
  if (open) {
    body.classList.remove('open');
    btn.classList.remove('open');
  } else {
    body.classList.add('open');
    btn.classList.add('open');
  }
}

function getKey(idx) { return 'b' + curBookIdx + '*' + idx; }

function buildQArea(idx) {
  const s = answers[getKey(idx)];

    + '<button class="q-save" onclick="saveAns(' + idx + ')">[ SAVE ]</button>';
}

function saveAns(idx) {
  var el = document.getElementById('qi' + idx);
  if (!el) { showToast('ERROR'); return; }
  var v = el.value.trim();
  if (v.length < 1) { showToast('내용을 입력해주세요'); return; }

  try { _set('bh5_ans', answers); } catch(e) {}

  if (area) {
    area.innerHTML = '<div class="q-done-box">'

      + '</div>'
      + '<br><button class="q-re" onclick="editAns(' + idx + ')">[ 다시 쓰기 ]</button>';
  }
  showToast('저장됐어요!');
}

function editAns(idx) {
  var area = document.getElementById('qa' + idx);
  if (!area) return;
  var prev = answers[getKey(idx)] || '';
  area.innerHTML = '<textarea class="q-inp" id="qi' + idx + '" rows="4">' + prev + '</textarea>'
    + '<br>'
    + '<button class="q-save" onclick="saveAns(' + idx + ')">[ SAVE ]</button>';
  var inp = document.getElementById('qi' + idx);
  if (inp) inp.focus();
}

      { t:'3-8장', s:'소행성 B-612와 장미',

      { t:'9-17장', s:'어른들의 별을 여행하며',
        body:'어린 왕자는 여러 별을 여행해요. 각 별에는 이상한 어른이 한 명씩 살고 있어요. 아무도 없는데 혼자 명령만 내리는 왕. 아무도 안 보는데 칭찬을 원하는 허영쟁이. 술 마시는 게 부끄러워서 술을 마시는 술꾼.\n\n별을 셀 수 없이 세면서 그게 자기 거라고 우기는 사업가. 1분마다 가스등을 켜고 끄는 점등인. 책상 앞에만 앉아 세상을 다 안다고 하는 지리학자.\n\n어린 왕자는 매번 어른들이 참 이상하다고 말해요. 하지만 이 어른들은 우리 주변에 실제로 있는 사람들이에요. 권력, 허영, 중독, 탐욕에 사로잡힌 사람들.\n\n유일하게 점등인만은 다른 사람을 위해 일하는 존재예요. 어린 왕자가 점등인만 친구가 될 수 있다고 말한 이유예요. 생텍쥐페리의 메시지: 자기만을 위해 사는 삶은 아무리 바빠도 텅 빈 거예요.',

function getBookProgress(bookIdx) {
  var book = BOOKS[bookIdx];
  var total = book.chapters.length;
  if (total === 0) return { pct: 0, status: '0%', isDone: false };
  var readSet = _get('bh5_read_b' + bookIdx, []);
  var readCount = readSet.length;
  // 전체 읽었으면 DONE
  if (readCount >= total) return { pct: 100, status: 'DONE', isDone: true };
  // 한 번도 안 읽었으면 초기값 유지
  if (readCount === 0) {
    var initPct = book.progress || 0;
    return { pct: initPct, status: initPct > 0 ? initPct + '%' : 'QUEUE', isDone: false };
  }
  var pct = Math.round((readCount / total) * 100);
  return { pct: pct, status: pct + '%', isDone: false };
}

function renderShelf() {
  var list = document.getElementById('shelfList');
  if (!list) return;

  // 한글 자음 추출
  function getConsonant(str) {
    var c = str.charCodeAt(0);
    if (c >= 0xAC00 && c <= 0xD7A3) {
      var idx = Math.floor((c - 0xAC00) / 588);
      return ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'][idx] || '*';
    }
    if (/[a-zA-Z]/.test(str[0])) return 'A';
    return '*';
  }
  function normCon(c) { return {'ㄲ':'ㄱ','ㄸ':'ㄷ','ㅃ':'ㅂ','ㅆ':'ㅅ','ㅉ':'ㅈ'}[c] || c; }

  // 현재 필터
  if (!window._shelfFilter) window._shelfFilter = '전체';
  var filter = window._shelfFilter;

  // 필터된 책 목록
  var filtered = [];
  BOOKS.forEach(function(book, i) {
    if (filter === '전체' || normCon(getConsonant(book.title)) === filter) {
      filtered.push({ book: book, idx: i });
    }
  });

  // 카드 인덱스 관리
  if (!window._shelfCardIdx) window._shelfCardIdx = 0;
  if (window._shelfCardIdx >= filtered.length) window._shelfCardIdx = 0;
  if (window._shelfCardIdx < 0) window._shelfCardIdx = filtered.length - 1;
  var ci = window._shelfCardIdx;

  // 사용 중인 자음 목록
  var usedCons = {};
  BOOKS.forEach(function(b) { usedCons[normCon(getConsonant(b.title))] = true; });
  var allCons = ['전체','ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ','A','*'];
  var activeCons = allCons.filter(function(c) { return c === '전체' || usedCons[c]; });

  var out = '';

  // ── 자음 필터 바 ──
  out += '<div style="display:flex;gap:4px;overflow-x:auto;padding:6px 0 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none">';
  activeCons.forEach(function(c) {
    var isActive = filter === c;
    var bg = isActive ? '#504840' : 'rgba(160,152,136,0.15)';
    var color = isActive ? '#EDE8E0' : '#706860';
    var size = c === '전체' ? 'padding:5px 12px' : 'width:32px;height:32px;display:flex;align-items:center;justify-content:center';
    out += '<button onclick="filterShelf(\'' + c + '\')" style="' + size + ';background:' + bg + ';color:' + color + ';border:none;border-radius:20px;font-family:var(--font);font-size:13px;font-weight:bold;cursor:pointer;flex-shrink:0">' + c + '</button>';
  });
  out += '</div>';

  if (filtered.length === 0) {
    out += '<div style="text-align:center;padding:30px;font-family:var(--font);font-size:13px;color:var(--dim)">이 자음의 책이 없어요</div>';
  } else {
    var item = filtered[ci];
    var book = item.book;
    var bi = item.idx;
    var prog = getBookProgress(bi);
    var delBtn = '<div onclick="event.stopPropagation();deleteCustomBook(' + bi + ')" style="text-align:center;margin-top:6px;color:#C04040;font-size:11px;font-family:var(--mono);cursor:pointer">[ 삭제 ]</div>';

    // 카드
    out += '<div style="display:flex;align-items:center;gap:6px">';
    out += '<button onclick="event.stopPropagation();shelfPrev()" style="width:28px;height:60px;background:none;border:none;font-size:20px;color:#A09888;cursor:pointer;flex-shrink:0">◀</button>';

    out += '<div onclick="selectBook(' + bi + ')" style="flex:1;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.35);border-radius:12px;padding:16px 16px 16px 18px;cursor:pointer;position:relative;box-shadow:0 4px 16px rgba(0,0,0,0.08),inset 0 1px 0 rgba(255,255,255,0.4);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)">';
    // 클립 (오른쪽 상단)
    out += '<svg width="24" height="50" viewBox="0 0 24 50" style="position:absolute;top:-12px;right:20px" fill="none"><path d="M12 0 L12 8 Q12 12 8 12 L8 38 Q8 46 16 46 L16 12 Q16 8 12 8" stroke="#888" stroke-width="1.8" fill="none"/></svg>';
    out += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">';
    out += '<span style="font-size:28px">' + book.emo + '</span>';
    out += '<div><div style="font-family:var(--font);font-size:14px;font-weight:bold;color:#2A2520">' + book.title + '</div>';
    out += '<div style="font-family:var(--font);font-size:10px;color:#8A8078;margin-top:2px">' + book.author + '</div></div></div>';
    out += '<span style="font-size:9px;font-family:var(--mono);color:#8A8078;letter-spacing:1px">' + book.chapters.length + ' CHAPTERS</span>';

    if (book.coreLines && book.coreLines[0]) {
      out += '<div style="margin-top:8px;padding:8px;background:rgba(0,0,0,0.03);border-left:2px solid #A09888;border-radius:2px;font-family:var(--font);font-size:11px;color:#504840;line-height:1.5;font-style:italic">"' + book.coreLines[0] + '"</div>';

    out += '<div style="flex:1;height:4px;background:rgba(0,0,0,0.08);border-radius:2px;overflow:hidden"><div style="width:' + prog.pct + '%;height:100%;background:#8A8078;border-radius:2px"></div></div>';
    out += '<span style="font-family:var(--mono);font-size:10px;color:' + (prog.isDone ? '#4A8050' : '#A09888') + ';font-weight:bold">' + prog.status + '</span></div>';
    out += '</div>';

    out += '<button onclick="event.stopPropagation();shelfNext()" style="width:28px;height:60px;background:none;border:none;font-size:20px;color:#A09888;cursor:pointer;flex-shrink:0">▶</button>';
    out += '</div>';

    // 카운터
    out += '<div style="text-align:center;margin-top:6px;font-family:var(--mono);font-size:10px;color:var(--green3)">' + (ci + 1) + ' / ' + filtered.length + '</div>';
    out += delBtn;

    // 터치 스와이프
    setTimeout(function() {
      var card = list.querySelector('[onclick^="selectBook"]');
      if (card && !card._swipe) {
        card._swipe = true;
        var sx = 0;
        card.addEventListener('touchstart', function(e) { sx = e.touches[0].clientX; }, {passive:true});
        card.addEventListener('touchend', function(e) {
          var d = e.changedTouches[0].clientX - sx;
          if (Math.abs(d) > 50) { if (d > 0) shelfPrev(); else shelfNext(); }
        });
      }
    }, 50);
  }

  out += '<div class="shelf-add" onclick="goAddBook()" style="margin-top:10px;display:flex;align-items:center;justify-content:space-between;"><div style="display:flex;align-items:center;gap:10px;"><span class="shelf-idx" style="color:var(--accent); font-weight:700">[+]</span><div class="shelf-add-txt">ADD NEW BOOK</div></div><span style="font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:1px;">사유 도서 생성기</span></div>';
  list.innerHTML = out;
}

function shelfPrev() {

function getFilteredBooks() {

    if (/[a-zA-Z]/.test(str[0])) return 'A'; return 'etc';
  }
  function norm(c) { return {'ㄲ':'ㄱ','ㄸ':'ㄷ','ㅃ':'ㅂ','ㅆ':'ㅅ','ㅉ':'ㅈ'}[c]||c; }
  var r = [];
  BOOKS.forEach(function(b,i) { if (filter==='전체'||norm(getC(b.title))===filter) r.push({book:b,idx:i}); });
  return r;
}

function initQuiz() {
  quizPool = [];
  // 모든 책에서 퀴즈 생성
  BOOKS.forEach(function(book, bi) {
    if (!book.chapters) return;
    book.chapters.forEach(function(ch, ci) {
      // 요약 기반 O/X 퀴즈
      if (ch.sm && ch.sm.length > 0) {
        quizPool.push({
          type: 'ox',
          book: book.title,
          q: '"' + book.title + '" - 다음 내용이 맞을까?',
          statement: ch.sm[0],
          answer: true,
          sketch: ['brain','worm','bulb','bomb','dizzy','cat'][Math.floor(Math.random()*6)]
        });
      }
      // 챕터 제목 맞히기
      if (ch.s && ch.body) {
        var bodySnippet = ch.body.slice(0, 60) + '...';
        quizPool.push({
          type: 'title',
          book: book.title,
          q: '"' + book.title + '" - 이 내용의 챕터 제목은?',
          hint: bodySnippet,
          answer: ch.s,
          sketch: ['brain','bulb','cat','dizzy'][Math.floor(Math.random()*4)]
        });
      }
      // 단어 뜻 맞히기
      if (ch.w && ch.w.length > 0) {
        var word = ch.w[0];
        quizPool.push({
          type: 'word',
          book: book.title,
          q: '"' + word.w + '"의 뜻은?',
          answer: word.d,
          wrong1: '기억이 안 나요...',
          sketch: ['worm','bomb','cat'][Math.floor(Math.random()*3)]
        });
      }
    });
  });
  // 셔플
  for (var i = quizPool.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = quizPool[i]; quizPool[i] = quizPool[j]; quizPool[j] = tmp;
  }
  quizIdx = 0;
  showQuiz();
}

function showQuiz() {
  if (!quizPool.length) {
    var wrap = document.getElementById('quizWrap');
    if (wrap) wrap.innerHTML = '<div style="padding:14px 0; text-align:center; font-family:var(--font); font-size:12px; color:var(--green3);">책을 읽고 퀴즈를 풀어보세요!</div>';
    return;
  }
  var quiz = quizPool[quizIdx % quizPool.length];
  var sketchEl = document.getElementById('quizSketch');
  var qEl = document.getElementById('quizQuestion');
  var optEl = document.getElementById('quizOptions');
  var resEl = document.getElementById('quizResult');
  if (!sketchEl || !qEl) return;

  sketchEl.innerHTML = getQuizSketch(quiz.sketch);
  resEl.style.display = 'none';

  if (quiz.type === 'ox') {
    qEl.innerHTML = quiz.q + '<br><span style="font-weight:normal;font-size:12px;color:#6A3040;">"' + quiz.statement + '"</span>';
    optEl.innerHTML = '<button onclick="event.stopPropagation();answerQuiz(true)" style="padding:7px 20px;margin-right:8px;background:#5A7A20;color:#E7F9A9;border:none;border-radius:20px;font-family:var(--mono);font-size:11px;font-weight:600;cursor:pointer;letter-spacing:1px;">O 맞아</button>'
      + '<button onclick="event.stopPropagation();answerQuiz(false)" style="padding:7px 20px;background:#7A3030;color:#F9E8E8;border:none;border-radius:20px;font-family:var(--mono);font-size:11px;font-weight:600;cursor:pointer;letter-spacing:1px;">X 아니야</button>';
  } else if (quiz.type === 'word') {
    qEl.innerHTML = quiz.q;
    optEl.innerHTML = '<button onclick="event.stopPropagation();revealAnswer()" style="padding:10px 20px;background:var(--accent);color:#E7F9A9;border:none;border-radius:8px;font-family:var(--mono);font-size:14px;cursor:pointer">🤔 정답 보기</button>';
  } else {
    qEl.innerHTML = quiz.q + '<br><span style="font-weight:normal;font-size:11px;color:#6A3040;">' + quiz.hint + '</span>';
    optEl.innerHTML = '<button onclick="event.stopPropagation();revealAnswer()" style="padding:10px 20px;background:var(--accent);color:#E7F9A9;border:none;border-radius:8px;font-family:var(--mono);font-size:14px;cursor:pointer">💡 정답 확인</button>';
  }
}

function answerQuiz(userAnswer) {
  var quiz = quizPool[quizIdx % quizPool.length];
  var resEl = document.getElementById('quizResult');
  var correct = (userAnswer === quiz.answer);
  resEl.style.display = 'block';
  resEl.innerHTML = correct
    ? '<span style="color:#2A6040">🎉 정답! 기억력 짱!</span>'
    : '<span style="color:#8B3040">😅 아쉽! 다시 읽어볼까?</span>';
}

function revealAnswer() {

function _hlGetCon(s) {
  var c = s.charCodeAt(0);
  if (c >= 0xAC00 && c <= 0xD7A3) {
    var r = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'][Math.floor((c-0xAC00)/588)] || 'etc';
    return {'ㄲ':'ㄱ','ㄸ':'ㄷ','ㅃ':'ㅂ','ㅆ':'ㅅ','ㅉ':'ㅈ'}[r] || r;
  }
  return /[a-zA-Z]/.test(s[0]) ? 'A' : 'etc';
}

// 음표 주파수
function n(note) {
  var notes = {
    C2:65.4,D2:73.4,E2:82.4,F2:87.3,G2:98,A2:110,B2:123.5,
    C3:130.8,D3:146.8,E3:164.8,F3:174.6,G3:196,A3:220,B3:246.9,
    C4:261.6,D4:293.7,E4:329.6,F4:349.2,G4:392,A4:440,B4:493.9,
    C5:523.3,D5:587.3,E5:659.3,F5:698.5,G5:784,A5:880,
    Db4:277.2,Eb4:311.1,Gb4:370,Ab4:415.3,Bb4:466.2,
    Db3:138.6,Eb3:155.6,Gb3:185,Ab3:207.7,Bb3:233.1,
    Db5:554.4,Eb5:622.3,Gb5:740,Ab5:830.6,Bb5:932.3,
    REST:0
  };
  return notes[note] || 0;
}

// 음표 재생 (부드러운 envelope)
function playNote(ctx, mg, freq, startTime, duration, type, vol) {
  if (!freq) return;
  var osc = ctx.createOscillator();
  var g = ctx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  var att = Math.min(0.08, duration * 0.2);
  var rel = Math.min(duration * 0.45, 0.6);
  g.gain.setValueAtTime(0, startTime);
  g.gain.linearRampToValueAtTime(vol || 0.15, startTime + att);
  g.gain.setValueAtTime(vol || 0.15, startTime + duration - rel);
  g.gain.linearRampToValueAtTime(0, startTime + duration);
  osc.connect(g); g.connect(mg);
  osc.start(startTime); osc.stop(startTime + duration + 0.1);
}

// 바이노럴 비트 생성 (헤드폰 권장, 아니어도 저주파 동조 효과)
// 왼쪽 귀: base Hz, 오른쪽 귀: base + beat Hz → 뇌가 차이값을 인식
function createBinaural(ctx, baseFreq, beatFreq, vol) {
  var merger = ctx.createChannelMerger(2);
  var splitter = ctx.createChannelSplitter(2);

  var oscL = ctx.createOscillator();
  var oscR = ctx.createOscillator();
  var gL = ctx.createGain();
  var gR = ctx.createGain();

  oscL.type = 'sine'; oscL.frequency.value = baseFreq;
  oscR.type = 'sine'; oscR.frequency.value = baseFreq + beatFreq;
  gL.gain.value = vol; gR.gain.value = vol;

  oscL.connect(gL); oscR.connect(gR);
  gL.connect(merger, 0, 0);
  gR.connect(merger, 0, 1);
  merger.connect(ctx.destination);

  oscL.start(); oscR.start();
  return [oscL, oscR, gL, gR, merger];
}

// 리버브
function makeReverb(ctx, secs) {
  var conv = ctx.createConvolver();
  var len = ctx.sampleRate * (secs || 2.5);
  var buf = ctx.createBuffer(2, len, ctx.sampleRate);
  for (var c = 0; c < 2; c++) {
    var d = buf.getChannelData(c);
    for (var i = 0; i < len; i++)
      d[i] = (Math.random()*2-1) * Math.pow(1-i/len, 2.2);
  }
  conv.buffer = buf;
  return conv;
}

function startMusicLoop(bookId) {
  if (!audioCtx) return;
  var sound = BOOK_SOUNDS[bookId] || BOOK_SOUNDS[0];
  var beat = 60 / (sound.bpm || 72);

  // 마스터 게인
  var masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.75;

  // 리버브 (홀 느낌)
  var reverb = makeReverb(audioCtx, 3);
  var dryGain = audioCtx.createGain(); dryGain.gain.value = 0.55;
  var wetGain = audioCtx.createGain(); wetGain.gain.value = 0.45;
  masterGain.connect(dryGain); dryGain.connect(audioCtx.destination);
  masterGain.connect(reverb); reverb.connect(wetGain); wetGain.connect(audioCtx.destination);
  musicNodes.push(masterGain, reverb, dryGain, wetGain);

  // 바이노럴 비트 (뇌파 동조)
  if (sound.binaural) {
    var bn = createBinaural(
      audioCtx,
      sound.binaural.base,
      sound.binaural.beat,
      sound.binaural.vol
    );
    musicNodes = musicNodes.concat(bn);
  }

  // 멜로디 루프 스케줄러
  var nextLoopTime = audioCtx.currentTime + 0.15;

  function schedule() {
    if (!musicOn) return;
    if (nextLoopTime < audioCtx.currentTime + 0.4) {
      var t = nextLoopTime;
      var loopDur = 0;

      // 멜로디
      sound.mel.forEach(function(m) {
        playNote(audioCtx, masterGain, n(m[0]), t, m[1]*beat*0.82, sound.melType||'sine', sound.melVol||0.13);
        t += m[1] * beat;
      });
      loopDur = t - nextLoopTime;

      // 베이스
      t = nextLoopTime;
      sound.bass.forEach(function(b) {
        playNote(audioCtx, masterGain, n(b[0]), t, b[1]*beat*0.75, 'sine', sound.bassVol||0.09);
        t += b[1] * beat;
      });

      nextLoopTime += loopDur;
    }
    musicScheduler = setTimeout(schedule, 120);
  }
  schedule();
}

function stopMusic() {
  if (musicScheduler) { clearTimeout(musicScheduler); musicScheduler = null; }
  musicNodes.forEach(function(node) {
    try { if (node.stop) node.stop(); node.disconnect(); } catch(e) {}
  });
  musicNodes = [];
}

function toggleMusic() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (musicOn) {
    stopMusic();
    musicOn = false;
    document.getElementById('music-ico').textContent = '♪';
    document.getElementById('music-lbl').textContent = 'BGM';
    document.getElementById('nav-music').classList.remove('active');
    showToast('음악 꺼짐');
  } else {
    var bookId = typeof curBookIdx !== 'undefined' ? curBookIdx : 0;
    musicOn = true;
    startMusicLoop(bookId);
    document.getElementById('music-ico').textContent = '♫';
    document.getElementById('music-lbl').textContent = 'BGM ON';
    document.getElementById('nav-music').classList.add('active');
    var bv = BOOK_SOUNDS[bookId] ? BOOK_SOUNDS[bookId].binaural : null;
    var hz = bv ? ' · α' + bv.beat + 'Hz' : '';
    showToast('♫ ' + (BOOKS[bookId] ? BOOKS[bookId].title : '') + hz);
  }
}

function switchMusicForBook(bookId) {
  if (!musicOn) return;
  stopMusic();
  startMusicLoop(bookId);
}

  var presets = {

      bass:[['A2',2],['E3',2],['F3',2],['E3',2],['A2',2],['D3',2],['E3',2],['A2',2]],
      melType:'sine',melVol:0.11,bassVol:0.08 },
    // 알파파(8-10Hz): 가벼운 집중 → 모험/SF/판타지
    'adventure': { bpm:84, binaural:{base:200,beat:10,vol:0.04},
      mel:[['G4',1],['E4',1],['C4',1],['D4',1],['F4',1],['E4',0.5],['D4',0.5],['C4',2],['A4',1],['G4',1],['E4',1.5],['D4',0.5],['C4',2],['REST',2]],
      bass:[['C3',2],['G3',2],['F3',2],['G3',2],['C3',2],['F3',2],['C3',4]],
      melType:'triangle',melVol:0.13,bassVol:0.09 },
    // 알파파(8Hz): 편안한 집중 → 에세이/수필/자기계발
    'calm': { bpm:72, binaural:{base:196,beat:8,vol:0.038},
      mel:[['C4',2],['E4',1],['G4',1],['A4',2],['G4',2],['F4',1],['E4',1],['D4',2],['C4',2],['REST',2],['E4',1],['G4',1],['C5',2],['A4',1],['G4',1],['E4',2],['REST',2]],
      bass:[['C3',4],['F3',4],['G3',4],['C3',4]],
      melType:'sine',melVol:0.10,bassVol:0.07 },
    // 세타파(5Hz): 명상적 → 시/동양철학
    'meditative': { bpm:54, binaural:{base:160,beat:5,vol:0.04},
      mel:[['D4',3],['F4',1],['A4',2],['G4',2],['F4',2],['D4',2],['REST',2],['A3',2],['D4',2],['F4',2],['E4',3],['D4',1],['REST',4]],
      bass:[['D3',4],['A2',4],['F3',4],['D3',4]],
      melType:'sine',melVol:0.09,bassVol:0.07 },
    // 알파파(10Hz): 활발한 집중 → 역사/사회/논픽션
    'energetic': { bpm:88, binaural:{base:220,beat:10,vol:0.04},
      mel:[['E4',1],['G4',1],['A4',0.5],['B4',0.5],['C5',1],['B4',1],['A4',1],['G4',1],['E4',2],['REST',1],['D4',1],['E4',1],['G4',1],['A4',2],['G4',1],['E4',1],['D4',2],['REST',2]],
      bass:[['E3',2],['A2',2],['D3',2],['E3',2],['A2',2],['B2',2],['E3',4]],
      melType:'triangle',melVol:0.12,bassVol:0.09 },
    // 세타파(7Hz): 감성적 → 동화/성장/감동
    'emotional': { bpm:68, binaural:{base:190,beat:7,vol:0.036},
      mel:[['C4',2],['E4',1],['G4',1],['F4',2],['E4',1],['D4',1],['C4',3],['REST',1],['A3',1],['C4',1],['E4',2],['D4',1],['C4',1],['B3',2],['REST',2]],
      bass:[['C3',4],['F3',2],['G3',2],['E3',2],['A2',2],['C3',4]],
      melType:'sine',melVol:0.11,bassVol:0.08 }
  };

  // 장르 키워드 매칭
  var g = (genre || '').toLowerCase();
  var preset;
  if (g.match(/철학|사상|논어|도덕|윤리/)) preset = 'meditative';
  else if (g.match(/sf|SF|판타지|모험|탐험|우주|공상|과학소설/)) preset = 'adventure';
  else if (g.match(/수필|에세이|자기계발|경제|경영/)) preset = 'calm';
  else if (g.match(/역사|사회|과학|논픽션|정치/)) preset = 'energetic';
  else if (g.match(/동화|성장|감동|우화|그림책/)) preset = 'emotional';
  else if (g.match(/소설|문학|심리|실존|고전/)) preset = 'deep';
  else preset = 'calm';

  BOOK_SOUNDS[bookId] = presets[preset];
  return preset;
}

    generateBookMusic(newId, book.genre || '');
    try { _set('bh5_custom_books', BOOKS.slice(11)); } catch(e) {}
    status.textContent = '✅ 완성!';
    document.getElementById('aiBookTitle').value = '';
    document.getElementById('aiBookAuthor').value = '';
    document.getElementById('aiJsonInput').value = '';
    document.getElementById('aiJsonInput').style.display = 'none';
    document.getElementById('aiJsonBtn').style.display = 'none';
    showToast('📚 ' + book.title + ' 추가 완료!');
    setTimeout(function() { navTo('home'); renderShelf(); }, 1000);
  } catch(e) {
    status.textContent = '❌ JSON 형식 오류. 다시 시도해주세요.';
  }
}

function renderSrch(q) {
  const f = q ? SRCH.filter(b => b.t.includes(q) || b.a.includes(q)) : SRCH;
  document.getElementById('srchRes').innerHTML = f.map((b, i) =>
    `<div class="res-item"><span class="res-idx">[${i}]</span><div class="res-emo">${b.e}</div><div style="flex:1"><div class="res-ttl">${b.t}</div><div class="res-auth">${b.a}</div><div class="res-genre">${b.g}</div></div><button class="res-add" onclick="showToast('ADDED')">ADD</button></div>`
  ).join('');
}
function deleteCustomBook(idx) {
  var book = BOOKS[idx];
  if (!book) return;
  if (!confirm('"' + book.title + '" 을 삭제할까요?')) return;
  BOOKS.splice(idx, 1);
  // Re-assign IDs
  BOOKS.forEach(function(b, i) { b.id = i; });
  // Save custom books
  try { _set('bh5_custom_books', BOOKS.slice(11).filter(function(b) { return !b._builtin; })); } catch(e) {}
  renderShelf();
  renderToday();
  showToast('"' + book.title + '" 삭제됨');
}

function filterBooks(v) { renderSrch(v); }

window.addEventListener('load', function() {
  // 커스텀 책 로드 (AI로 추가한 책들)
  try {
    var customBooks = _get('bh5_custom_books', []);
    if (customBooks && customBooks.length > 0) {
      customBooks.forEach(function(book, i) {
        book.id = BOOKS.length;
        book.emo = book.emo || book.emoji || '📚';
        book.chapters = (book.chapters || []).map(function(ch, ci) {
          ch.fe = ch.fe || '📖';
          ch.sm = ch.sm || [];
          ch.w = ch.w || [];
          ch.sk = ch.sk || 'book';
          return ch;
        });
        BOOKS.push(book);
        // 음악도 자동 생성
        if (typeof generateBookMusic === 'function') {
          generateBookMusic(book.id, book.genre || '');
        }
      });
      console.log('Loaded ' + customBooks.length + ' custom books');
    }
  } catch(e) { console.warn('Custom books load error', e); }

  try { renderSrch(''); }    catch(e) { console.warn('renderSrch error', e); }
  try { renderShelf(); }     catch(e) { console.warn('renderShelf error', e); }
  try { renderToday(); }     catch(e) { console.warn('renderToday error', e); }
  try { renderChTabs(0); }   catch(e) { console.warn('renderChTabs error', e); }
});
</script>
